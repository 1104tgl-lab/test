    const getSortedHomework = (list) => {
      if (!list) return [];
      return [...list].sort((a, b) => {
        if (a.important && !b.important) return -1;
        if (!a.important && b.important) return 1;
        if (!a.done && b.done) return -1;
        if (a.done && !b.done) return 1;
        return 0;
      });
    };

    const getWeeklyResetIndicator = (date) => {
      const d = new Date(date);
      d.setDate(d.getDate() - ((d.getDay() + 3) % 7)); // Thursday reset indicator alignment
      return d.toDateString();
    };

    const formatSeconds = (totalSec) => {
      if (totalSec <= 0) return '완료!';
      const days = Math.floor(totalSec / 86400);
      const hrs = Math.floor((totalSec % 86400) / 3600);
      const mins = Math.floor((totalSec % 3600) / 60);
      const secs = totalSec % 60;
      return `${days > 0 ? days + '일 ' : ''}${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    };

    const getCountdownToMidnight = (now) => {
      const midnight = new Date(now);
      midnight.setHours(24, 0, 0, 0);
      const diff = midnight.getTime() - now.getTime();
      const hrs = Math.floor(diff / 3600000);
      const mins = Math.floor((diff % 3600000) / 60000);
      const secs = Math.floor((diff % 60000) / 1000);
      return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    };

    const getCountdownToTwelveHour = (now) => {
      const hours = now.getHours();
      const nextReset = new Date(now);
      if (hours < 12) {
        nextReset.setHours(12, 0, 0, 0);
      } else {
        nextReset.setHours(24, 0, 0, 0);
      }
      const diff = nextReset.getTime() - now.getTime();
      const hrs = Math.floor(diff / 3600000);
      const mins = Math.floor((diff % 3600000) / 60000);
      const secs = Math.floor((diff % 60000) / 1000);
      return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    };

    const getCountdownToThursday = (now) => {
      const today = now.getDay();
      const daysUntilThursday = (4 - today + 7) % 7 || 7;
      const target = new Date(now);
      target.setDate(now.getDate() + daysUntilThursday);
      target.setHours(0, 0, 0, 0);

      const diff = target.getTime() - now.getTime();
      const days = Math.floor(diff / 86400000);
      const hrs = Math.floor((diff % 86400000) / 3600000);
      const mins = Math.floor((diff % 3600000) / 60000);
      return `${days}일 ${hrs}시간 ${mins}분`;
    };

    const getPostOfficeStatus = (now) => {
      const hour = now.getHours();
      const min = now.getMinutes();
      const sec = now.getSeconds();

      const currentPeriodHour = Math.floor(hour / 2) * 2;
      const isCurrentlyOpen = min < 20;

      if (isCurrentlyOpen) {
        const remainingMin = 19 - min;
        const remainingSec = 59 - sec;
        return {
          isOpen: true,
          text: '광장 우체국 보상 수령 가능!',
          subText: `${remainingMin}분 ${remainingSec}초 내 수령 필요`,
          currentWindow: `${currentPeriodHour}시 ~ ${currentPeriodHour}시 20분`
        };
      } else {
        const nextOpenHour = (currentPeriodHour + 2) % 24;
        let targetDate = new Date(now);
        targetDate.setHours(nextOpenHour, 0, 0, 0);
        if (nextOpenHour <= hour) {
          targetDate.setDate(targetDate.getDate() + 1);
        }
        const diffMs = targetDate.getTime() - now.getTime();
        const diffHr = Math.floor(diffMs / 3600000);
        const diffMin = Math.floor((diffMs % 3600000) / 60000);
        const diffSec = Math.floor((diffMs % 60000) / 1000);

        return {
          isOpen: false,
          text: '우체국 수령 대기 중',
          subText: `다음 개방: ${diffHr > 0 ? diffHr + '시간 ' : ''}${diffMin}분 ${diffSec}초 남음`,
          currentWindow: `${nextOpenHour}시 ~ ${nextOpenHour}시 20분`
        };
      }
    };

    const generateSyncCode = () => {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let code = 'CRK-';
      for (let i = 0; i < 6; i++) {
        code += chars.charAt(Math.floor(Math.random() * chars.length));
      }

    // --- Core Game Initialization Data ---
    const INITIAL_DAILY = [
      { id: 1, name: '친구 선물 보내기', done: false, important: true, memo: '' },
      { id: 2, name: '무료 선물 받기', done: false, important: false, memo: '' },

    const DEFAULT_TIMERS = [

      { id: 'dock', name: '선착장 보상', totalSeconds: 8 * 3600, remainingSeconds: 8 * 3600, isRunning: false, preset: true },

      { id: 'balloon', name: '곰젤리 열기구', totalSeconds: 5 * 3600 + 46 * 60, remainingSeconds: 5 * 3600 + 46 * 60, isRunning: false, preset: true },
      { id: 'beach', name: '앵무의 해변교역소', totalSeconds: 6 * 3600, remainingSeconds: 6 * 3600, isRunning: false, preset: true },
      { id: 'mine_explore', name: '광산 탐험', totalSeconds: 8 * 3600, remainingSeconds: 8 * 3600, isRunning: false, preset: true },
      { id: 'mine_harvest', name: '광산 채굴', totalSeconds: 24 * 3600, remainingSeconds: 24 * 3600, isRunning: false, preset: true }
    ];

    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [now, setNow] = useState(new Date());

      const [user, setUser] = useState(null);
      const [syncCode, setSyncCode] = useState(() => {
        return localStorage.getItem('crk_sync_code_v3') || generateSyncCode();
      });
      const [syncInput, setSyncInput] = useState('');
      const [cloudStatus, setCloudStatus] = useState('authenticating');
      const [toastMessage, setToastMessage] = useState('');

      const [modalConfig, setModalConfig] = useState({ isOpen: false, title: '', message: '', onConfirm: null });
      const [promptConfig, setPromptConfig] = useState({ isOpen: false, title: '', placeholder: '', value: '', onConfirm: null });

      const [dailyHomework, setDailyHomework] = useState(() => {
        const cached = localStorage.getItem('crk_local_daily_hw');
        return cached ? JSON.parse(cached) : INITIAL_DAILY;
      });
      const [twelveHourHomework, setTwelveHourHomework] = useState(() => {
        const cached = localStorage.getItem('crk_local_12h_hw');
        return cached ? JSON.parse(cached) : INITIAL_TWELVE;
      });
      const [weeklyHomework, setWeeklyHomework] = useState(() => {
        const cached = localStorage.getItem('crk_local_weekly_hw');
        return cached ? JSON.parse(cached) : INITIAL_WEEKLY;
      });
      const [currencies, setCurrencies] = useState(() => {
        const cached = localStorage.getItem('crk_local_currencies');
        return cached ? JSON.parse(cached) : INITIAL_CURRENCIES;
      });
      const [timers, setTimers] = useState(() => {
        const cached = localStorage.getItem('crk_local_timers');
        return cached ? JSON.parse(cached) : DEFAULT_TIMERS;
      });
      const [postOfficeClaims, setPostOfficeClaims] = useState(() => {
        const cached = localStorage.getItem('crk_local_claims');
        return cached ? JSON.parse(cached) : { date: new Date().toDateString(), claims: [false, false, false] };
      });

      const [quickTimer, setQuickTimer] = useState(() => {
        const cached = localStorage.getItem('crk_local_quick_timer');
        return cached ? JSON.parse(cached) : { name: '개인용 퀵 타이머 🎯', totalSeconds: 300, remainingSeconds: 300, isRunning: false };
      });
      const [quickTimerInputName, setQuickTimerInputName] = useState('개인용 퀵 타이머 🎯');
      
      const [quickTimerDays, setQuickTimerDays] = useState('0');
      const [quickTimerHours, setQuickTimerHours] = useState('0');
      const [quickTimerMinutes, setQuickTimerMinutes] = useState('5');
      const [quickTimerSeconds, setQuickTimerSeconds] = useState('0');

      const [inlineEditingId, setInlineEditingId] = useState(null);
      const [inlineDays, setInlineDays] = useState(0);
      const [inlineHours, setInlineHours] = useState(0);
      const [inlineMinutes, setInlineMinutes] = useState(0);

      const [newDailyName, setNewDailyName] = useState('');
      const [newTwelveName, setNewTwelveName] = useState('');
      const [newWeeklyName, setNewWeeklyName] = useState('');

      // --- Custom Timer Registration State Fields ---
      const [customTimerName, setCustomTimerName] = useState('');
      const [customTimerDays, setCustomTimerDays] = useState('0');
      const [customTimerHours, setCustomTimerHours] = useState('0');
      const [customTimerMinutes, setCustomTimerMinutes] = useState('0');

      // --- Core Helpers (Standard function Hoisted Declarations) ---
      function showToast(message) {
        setToastMessage(message);
        setTimeout(() => setToastMessage(''), 2500);
      }

      async function saveToCloud(newData) {
        if (!user || !syncCode || cloudStatus === 'error' || cloudStatus === 'local' || cloudStatus === 'api-disabled') return;
        try {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'kingdoms', syncCode);
          const payload = {
            dailyHomework: newData.dailyHomework ?? dailyHomework,
            twelveHourHomework: newData.twelveHourHomework ?? twelveHourHomework,
            weeklyHomework: newData.weeklyHomework ?? weeklyHomework,
            currencies: newData.currencies ?? currencies,
            timers: (newData.timers ?? timers).map(t => ({
              ...t,
              lastTickTime: t.isRunning ? Date.now() : null
            })),
            postOfficeClaims: newData.postOfficeClaims ?? postOfficeClaims,
            quickTimer: {
              ...(newData.quickTimer ?? quickTimer),
              lastTickTime: (newData.quickTimer ?? quickTimer).isRunning ? Date.now() : null
            },
            lastUpdatedTime: Date.now()
          };
          await setDoc(docRef, payload, { merge: true });
        } catch (e) {
          console.error("Failed to commit state to Firestore: ", e);
        }
      }

      function dispatchStateUpdate(updates) {
        try {
          if (updates.dailyHomework !== undefined) {
            setDailyHomework(updates.dailyHomework);
            localStorage.setItem('crk_local_daily_hw', JSON.stringify(updates.dailyHomework));
          }
          if (updates.twelveHourHomework !== undefined) {
            setTwelveHourHomework(updates.twelveHourHomework);
            localStorage.setItem('crk_local_12h_hw', JSON.stringify(updates.twelveHourHomework));
          }
          if (updates.weeklyHomework !== undefined) {
            setWeeklyHomework(updates.weeklyHomework);
            localStorage.setItem('crk_local_weekly_hw', JSON.stringify(updates.weeklyHomework));
          }
          if (updates.currencies !== undefined) {
            setCurrencies(updates.currencies);
            localStorage.setItem('crk_local_currencies', JSON.stringify(updates.currencies));
          }
          if (updates.timers !== undefined) {
            setTimers(updates.timers);
            localStorage.setItem('crk_local_timers', JSON.stringify(updates.timers));
          }
          if (updates.postOfficeClaims !== undefined) {
            setPostOfficeClaims(updates.postOfficeClaims);
            localStorage.setItem('crk_local_claims', JSON.stringify(updates.postOfficeClaims));
          }
          if (updates.quickTimer !== undefined) {
            setQuickTimer(updates.quickTimer);
            localStorage.setItem('crk_local_quick_timer', JSON.stringify(updates.quickTimer));
          }
          if (cloudStatus === 'connected') {
            saveToCloud(updates);
          }
        } catch (e) {
          console.error("Dual-Engine Dispatch Failed", e);
        }
      }

      // --- Timer Tab Control Functions ---
      function startTimer(id) {
        const next = timers.map(t => (t.id === id ? { ...t, isRunning: true } : t));
        dispatchStateUpdate({ timers: next });
      }

      function pauseTimer(id) {
        const next = timers.map(t => (t.id === id ? { ...t, isRunning: false } : t));
        dispatchStateUpdate({ timers: next });
      }

      function resetTimer(id) {
        const next = timers.map(t => (t.id === id ? { ...t, remainingSeconds: t.totalSeconds, isRunning: false } : t));
        dispatchStateUpdate({ timers: next });
      }

      // Safe bounds to skip seconds
      function accelerateTimer(id, minutesToSkip) {
        const next = timers.map(t => {
          if (t.id === id) {
            const skipSec = minutesToSkip * 60;
            const newRemaining = Math.max(0, t.remainingSeconds - skipSec);
            return { ...t, remainingSeconds: newRemaining };
          }
          return t;
        });
        dispatchStateUpdate({ timers: next });
      }

      function changePresetDuration(id, days, hours, minutes) {
        const totalSecs = (parseInt(days) || 0) * 86400 + (parseInt(hours) || 0) * 3600 + (parseInt(minutes) || 0) * 60;
        if (totalSecs <= 0) return;
        const next = timers.map(t => (t.id === id ? { ...t, totalSeconds: totalSecs, remainingSeconds: totalSecs, isRunning: false } : t));
        dispatchStateUpdate({ timers: next });
      }

      function handleAddCustomTimer(e) {
        e.preventDefault();
        if (!customTimerName) return;
        const totalSecs = (parseInt(customTimerDays) || 0) * 86400 + (parseInt(customTimerHours) || 0) * 3600 + (parseInt(customTimerMinutes) || 0) * 60;
        if (totalSecs <= 0) return;

        const newTimer = {
          id: 'custom_' + Date.now(),
          name: customTimerName,
          totalSeconds: totalSecs,
          remainingSeconds: totalSecs,
          isRunning: false,
          preset: false
        };

        const next = [...timers, newTimer];
        dispatchStateUpdate({ timers: next });

        setCustomTimerName('');
        setCustomTimerDays('0');
        setCustomTimerHours('0');
        setCustomTimerMinutes('0');
      }

      function handleDeleteTimer(id) {
        const next = timers.filter(t => t.id !== id);
        dispatchStateUpdate({ timers: next });
      }

      function saveInlineEdit(id) {
        const totalSecs = (parseInt(inlineDays) || 0) * 86400 + (parseInt(inlineHours) || 0) * 3600 + (parseInt(inlineMinutes) || 0) * 60;
        if (totalSecs <= 0) return;
        const next = timers.map(t => (t.id === id ? { ...t, totalSeconds: totalSecs, remainingSeconds: totalSecs, isRunning: false } : t));
        dispatchStateUpdate({ timers: next });
        setInlineEditingId(null);
      }

      useEffect(() => {
        const connectionTimeout = setTimeout(() => {
          if (cloudStatus === 'authenticating' || cloudStatus === 'syncing') {
            setCloudStatus('local');
            setUser({ uid: 'local-guest-user', isAnonymous: true });
            showToast("📴 오프라인 로컬 모드로 전환되었습니다.");
          }
        }, 4000);
        return () => clearTimeout(connectionTimeout);
      }, [cloudStatus]);

      useEffect(() => {
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (e) {
            setCloudStatus('error');
            setUser({ uid: 'local-guest-user', isAnonymous: true });
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (usr) => {
          if (usr) setUser(usr);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !syncCode || cloudStatus === 'error' || cloudStatus === 'local' || cloudStatus === 'api-disabled') return;
        setCloudStatus('syncing');
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'kingdoms', syncCode);
        const unsubscribe = onSnapshot(docRef, (snapshot) => {
          try {
            if (snapshot.exists()) {
              const data = snapshot.data();
              const nowMs = Date.now();
              const alignedTimers = (data.timers || []).map(t => {
                if (t.isRunning && t.lastTickTime) {
                  const elapsed = Math.floor((nowMs - t.lastTickTime) / 1000);
                  return { ...t, remainingSeconds: Math.max(0, t.remainingSeconds - elapsed) };
                }
                return t;
              });
              const alignedQuickTimer = data.quickTimer ? {
                ...data.quickTimer,
                remainingSeconds: (data.quickTimer.isRunning && data.quickTimer.lastTickTime)
                  ? Math.max(0, data.quickTimer.remainingSeconds - Math.floor((nowMs - data.quickTimer.lastTickTime) / 1000))
                  : data.quickTimer.remainingSeconds
              } : null;

              if (data.dailyHomework) {
                setDailyHomework(data.dailyHomework);
                localStorage.setItem('crk_local_daily_hw', JSON.stringify(data.dailyHomework));
              }
              if (data.twelveHourHomework) {
                setTwelveHourHomework(data.twelveHourHomework);
                localStorage.setItem('crk_local_12h_hw', JSON.stringify(data.twelveHourHomework));
              }
              if (data.weeklyHomework) {
                setWeeklyHomework(data.weeklyHomework);
                localStorage.setItem('crk_local_weekly_hw', JSON.stringify(data.weeklyHomework));
              }
              if (data.currencies) {
                setCurrencies(data.currencies);
                localStorage.setItem('crk_local_currencies', JSON.stringify(data.currencies));
              }
              if (data.postOfficeClaims) {
                setPostOfficeClaims(data.postOfficeClaims);
                localStorage.setItem('crk_local_claims', JSON.stringify(data.postOfficeClaims));
              }
              if (alignedTimers.length > 0) {
                setTimers(alignedTimers);
                localStorage.setItem('crk_local_timers', JSON.stringify(alignedTimers));
              }
              if (alignedQuickTimer) {
                setQuickTimer(alignedQuickTimer);
                setQuickTimerInputName(alignedQuickTimer.name);
                localStorage.setItem('crk_local_quick_timer', JSON.stringify(alignedQuickTimer));
              }
              setCloudStatus('connected');
            } else {
              saveToCloud({ dailyHomework, twelveHourHomework, weeklyHomework, currencies, timers, postOfficeClaims, quickTimer });
            }
          } catch (err) {
            console.error(err);
          }
        }, (error) => {
          console.error("Firestore Error Block: ", error);
          if (error.code === 'permission-denied' || error.message.includes('disabled') || error.message.includes('API') || error.message.includes('not been used')) {
            setCloudStatus('api-disabled');
          } else {
            setCloudStatus('local');
          }
        });
        return () => unsubscribe();
      }, [user, syncCode]);

      const toggleDaily = (id) => {
        const next = dailyHomework.map(t => t.id === id ? { ...t, done: !t.done } : t);
        dispatchStateUpdate({ dailyHomework: next });
      };
      const toggleTwelveHour = (id) => {
        const next = twelveHourHomework.map(t => t.id === id ? { ...t, done: !t.done } : t);
        dispatchStateUpdate({ twelveHourHomework: next });
      };
      const toggleWeekly = (id) => {
        const next = weeklyHomework.map(t => t.id === id ? { ...t, done: !t.done } : t);
        dispatchStateUpdate({ weeklyHomework: next });
      };
      const handleToggleStar = (type, id) => {
        const toggle = (list) => list.map(item => item.id === id ? { ...item, important: !item.important } : item);
        if (type === 'daily') dispatchStateUpdate({ dailyHomework: toggle(dailyHomework) });
        if (type === '12h') dispatchStateUpdate({ twelveHourHomework: toggle(twelveHourHomework) });
        if (type === 'weekly') dispatchStateUpdate({ weeklyHomework: toggle(weeklyHomework) });
      };
      const handleUpdateMemo = (type, id, memoText) => {
        const update = (list) => list.map(item => item.id === id ? { ...item, memo: memoText } : item);
        if (type === 'daily') dispatchStateUpdate({ dailyHomework: update(dailyHomework) });
        if (type === '12h') dispatchStateUpdate({ twelveHourHomework: update(twelveHourHomework) });
        if (type === 'weekly') dispatchStateUpdate({ weeklyHomework: update(weeklyHomework) });
      };
      const handleDeleteTask = (type, id) => {
        const filter = (list) => list.filter(item => item.id !== id);
        if (type === 'daily') dispatchStateUpdate({ dailyHomework: filter(dailyHomework) });
        if (type === '12h') dispatchStateUpdate({ twelveHourHomework: filter(twelveHourHomework) });
        if (type === 'weekly') dispatchStateUpdate({ weeklyHomework: filter(weeklyHomework) });
      };
      const handleAddTask = (type, e) => {
        e.preventDefault();
        if (type === 'daily' && newDailyName.trim()) {
          dispatchStateUpdate({ dailyHomework: [...dailyHomework, { id: Date.now(), name: newDailyName.trim(), done: false, important: false, memo: '', isCustom: true }] });
          setNewDailyName('');
        }
        if (type === '12h' && newTwelveName.trim()) {
          dispatchStateUpdate({ twelveHourHomework: [...twelveHourHomework, { id: Date.now(), name: newTwelveName.trim(), done: false, important: false, memo: '', isCustom: true }] });
          setNewTwelveName('');
        }
        if (type === 'weekly' && newWeeklyName.trim()) {
          dispatchStateUpdate({ weeklyHomework: [...weeklyHomework, { id: Date.now(), name: newWeeklyName.trim(), done: false, important: false, memo: '', isCustom: true }] });
          setNewWeeklyName('');
        }
      };
      const handleBulkCheck = (type, forceState) => {
        const bulk = (list) => list.map(item => ({ ...item, done: forceState }));
        if (type === 'daily') dispatchStateUpdate({ dailyHomework: bulk(dailyHomework) });
        if (type === '12h') dispatchStateUpdate({ twelveHourHomework: bulk(twelveHourHomework) });
        if (type === 'weekly') dispatchStateUpdate({ weeklyHomework: bulk(weeklyHomework) });
      };

      const handleApplyDirectQuickTimer = () => {
        const totalSecs = (parseInt(quickTimerDays) || 0) * 86400 + (parseInt(quickTimerHours) || 0) * 3600 + (parseInt(quickTimerMinutes) || 0) * 60 + (parseInt(quickTimerSeconds) || 0);
        if (totalSecs <= 0) return;
        dispatchStateUpdate({ quickTimer: { ...quickTimer, totalSeconds: totalSecs, remainingSeconds: totalSecs, isRunning: false } });
        showToast("🎯 설정이 완료되었습니다.");
      };

      const openInlineEdit = (t) => {
        setInlineEditingId(t.id);
        setInlineDays(Math.floor(t.totalSeconds / 86400));
        setInlineHours(Math.floor((t.totalSeconds % 86400) / 3600));
        setInlineMinutes(Math.floor((t.totalSeconds % 3600) / 60));
      };

      // --- Handler for Save Quick Timer Name ---
      const handleSaveQuickTimerName = () => {
        const next = { ...quickTimer, name: quickTimerInputName };
        dispatchStateUpdate({ quickTimer: next });
        showToast("🎯 퀵 타이머의 이름이 수정되었습니다.");
      };

      const dailyDoneCount = dailyHomework.filter(i => i.done).length;
      const twelveHourDoneCount = twelveHourHomework.filter(i => i.done).length;
      const weeklyDoneCount = weeklyHomework.filter(i => i.done).length;
      const totalTasks = dailyHomework.length + twelveHourHomework.length + weeklyHomework.length;
      const totalCompletedTasks = dailyDoneCount + twelveHourDoneCount + weeklyDoneCount;
      const totalProgressPercent = totalTasks > 0 ? Math.round((totalCompletedTasks / totalTasks) * 100) : 0;
      const postOfficeStatus = getPostOfficeStatus(now);

      const computedCurrencies = currencies.map(c => {
        if (c.current >= c.max || !c.isActive) return { ...c, liveCurrent: c.current, secondsToNext: 0, secondsToFull: 0 };
        const msPerUnit = c.rechargeTimeMinutes * 60 * 1000;
        const elapsedMs = now.getTime() - c.lastUpdated;
        const gainedUnits = Math.floor(elapsedMs / msPerUnit);
        const liveCurrent = Math.min(c.max, c.current + gainedUnits);
        let secondsToNext = 0, secondsToFull = 0;
        if (liveCurrent < c.max) {
          secondsToNext = Math.ceil((msPerUnit - (elapsedMs % msPerUnit)) / 1000);
          secondsToFull = Math.ceil(((c.max - liveCurrent) * msPerUnit - (elapsedMs % msPerUnit)) / 1000);
        }
        return { ...c, liveCurrent, secondsToNext, secondsToFull };
      });

      return (
        <div className="min-h-screen bg-[#F9F7F4] text-[#2D2A26] antialiased pb-20 px-4 md:px-8">
          
          {/* Dynamic Background Mesh Grid */}
          <div className="absolute top-0 left-0 right-0 h-[450px] bg-gradient-to-b from-[#F2ECE4] via-[#FDF9F3]/30 to-transparent pointer-events-none -z-10" />

          {/* Floating Toast notification */}
          {toastMessage && (
            <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[150] bg-stone-900 text-stone-100 px-5 py-3 rounded-2xl shadow-xl flex items-center space-x-2 animate-bounce">
              <span className="text-sm font-semibold">{toastMessage}</span>
            </div>
          )}

          {/* Header section */}
          <header className="max-w-7xl mx-auto pt-10 pb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-stone-200">
            <div>
              <h1 className="text-2xl font-black flex items-center gap-2 text-stone-900 tracking-tight">
                🍪 쿠키런: 킹덤 오버플래너
                {cloudStatus === 'connected' ? (
                  <span className="bg-emerald-600 text-white text-[10px] px-2 py-0.5 rounded-full uppercase tracking-widest font-black animate-pulse">CLOUD LIVE</span>
                ) : cloudStatus === 'api-disabled' ? (
                  <span className="bg-rose-600 text-white text-[10px] px-2 py-0.5 rounded-full uppercase tracking-widest font-black animate-pulse">FIRESTORE 활성화 대기</span>
                ) : (
                  <span className="bg-amber-600 text-white text-[10px] px-2 py-0.5 rounded-full uppercase tracking-widest font-black">LOCAL SESSION</span>
                )}
              </h1>
              <p className="text-xs text-stone-400 mt-1">파이어베이스와 로컬 이중 동기화 엔진이 탑재된 하이엔드 오버레이 스케줄러</p>
            </div>
            
            <div className="flex gap-2 flex-wrap items-center">
              <div className="bg-white px-4 py-2 border rounded-xl shadow-sm text-left">
                <span className="text-[9px] font-bold text-stone-400 block tracking-wider">SYNC CODE</span>
                <span className="font-mono text-sm font-black text-stone-800">{syncCode}</span>
              </div>
              <button onClick={() => { copyToClipboard(syncCode); showToast("📋 동기화 코드가 복사되었습니다!"); }} className="bg-stone-900 hover:bg-stone-850 text-white text-xs px-4 py-3 rounded-xl shadow-sm font-bold transition-all">코드 복사</button>
            </div>
          </header>

          {/* Connection Status & Troubleshooting Banner */}
          <div className="max-w-7xl mx-auto mt-4">
            {cloudStatus === 'api-disabled' && (
              <div className="bg-rose-50 border border-rose-200 p-5 rounded-2xl text-stone-700 leading-relaxed text-xs space-y-2 shadow-sm animate-pulse">
                <div className="flex items-center gap-2 text-rose-800 font-bold">
                  <span className="w-2.5 h-2.5 rounded-full bg-rose-600" />
                  <h4 className="text-sm">⚠️ Firestore Database API 비활성화됨 (매우 중요)</h4>
                </div>
                <p>
                  사용자님의 파이어베이스 프로젝트(<strong className="text-rose-950">copr-5d01f</strong>)에 <strong>Firestore Database</strong>가 생성되지 않았거나 비활성화되어 연결을 할 수 없습니다. (보내주신 캡처 화면에 있던 데이터베이스는 <strong>Realtime Database</strong>이며, 본 플래너는 <strong>Firestore Database</strong>를 사용하여 실시간 동기화를 처리합니다.)
                </p>
                <p className="font-bold text-rose-950 bg-rose-100/50 p-2.5 rounded-lg border border-rose-200/40">
                  🔧 해결법: 구글 파이어베이스 콘솔(https://console.firebase.google.com)로 이동 ➔ 왼쪽 메뉴에서 Build (빌드) ➔ [Firestore Database] 클릭 ➔ [데이터베이스 만들기 (Create Database)] 버튼을 눌러 생성을 마쳐주세요!
                </p>
                <p className="text-stone-500 font-medium font-sans">
                  * 현재 데이터베이스 활성화 전까지는, 브라우저가 변경 사안을 안전하게 로컬 저장소에 0ms 무지연 반응 속도로 보존하고 있으므로 안심하고 사용하셔도 됩니다.
                </p>
              </div>
            )}
          </div>

          {/* Tab nav container */}
          <nav className="max-w-7xl mx-auto mt-6 sticky top-4 z-50">
            <div className="bg-white/80 backdrop-blur-xl border border-stone-200/50 p-1.5 rounded-2xl shadow-md max-w-xl mx-auto">
              <div className="grid grid-cols-4 gap-1">
                {[
                  { id: 'dashboard', label: '📊 대시보드' },
                  { id: 'homework', label: '📅 숙제 패널' },
                  { id: 'currency', label: '⚡ 재화 충전' },
                  { id: 'timer', label: '⏳ 가속 센터' }
                ].map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`py-2 text-xs font-bold rounded-xl transition-all ${
                      activeTab === tab.id ? 'bg-stone-900 text-white shadow-md' : 'text-stone-600 hover:text-stone-900 hover:bg-stone-100/60'
                    }`}
                  >
                    {tab.label}
                  </button>
                ))}
              </div>
            </div>
          </nav>

          {/* Content tabs rendering */}
          <main className="max-w-7xl mx-auto mt-8">
            
            {/* Tab 1. Dashboard View */}
            {activeTab === 'dashboard' && (
              <div className="space-y-6">
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                  {/* Post office details */}
                  <div className="lg:col-span-7 bg-white p-6 rounded-3xl border border-stone-100 shadow-sm flex flex-col justify-between">
                    <div>
                      <span className="text-[10px] font-bold text-stone-400 block tracking-widest uppercase">📮 POST OFFICE MONITOR</span>
                      <h2 className="text-xl font-bold mt-4 text-stone-800">{postOfficeStatus.text}</h2>
                      <p className="text-xs text-stone-400 mt-1">오늘 목표 개방 타임대: {postOfficeStatus.currentWindow}</p>
                      
                      <div className="bg-[#FAF9F6] p-4 rounded-2xl border border-stone-200/50 mt-4">
                        <div className="flex justify-between items-center text-xs font-bold text-stone-700">
                          <span>개방진행률</span>
                          <span className="text-amber-700">{postOfficeStatus.subText}</span>
                        </div>
                        <div className="w-full bg-stone-200/50 h-2 rounded-full mt-2 overflow-hidden">
                          <div className={`h-full transition-all duration-1000 ${postOfficeStatus.isOpen ? 'bg-emerald-500' : 'bg-amber-600'}`} style={{ width: postOfficeStatus.isOpen ? '100%' : '50%' }} />
                        </div>
                      </div>
                    </div>

                    {/* Checkbox matrix */}
                    <div className="mt-6 pt-4 border-t border-stone-100 grid grid-cols-3 gap-2">
                      {[0, 1, 2].map(idx => (
                        <button
                          key={idx}
                          onClick={() => {
                            const claims = [...postOfficeClaims.claims];
                            claims[idx] = !claims[idx];
                            dispatchStateUpdate({ postOfficeClaims: { ...postOfficeClaims, claims } });
                          }}
                          className={`py-3 rounded-xl text-xs font-bold transition-all border ${
                            postOfficeClaims.claims[idx] ? 'bg-stone-900 border-stone-900 text-white shadow-sm' : 'bg-[#FAF9F6] border-stone-200 text-stone-600 hover:bg-stone-100/60'
                          }`}
                        >
                          {idx + 1}회 수령 {postOfficeClaims.claims[idx] ? '✓' : '대기'}
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* Completion Engine progress */}
                  <div className="lg:col-span-5 bg-white p-6 rounded-3xl border border-stone-100 shadow-sm flex flex-col justify-between">
                    <div>
                      <span className="text-[10px] font-bold text-stone-400 block tracking-widest uppercase">📊 PROGRESS PANEL</span>
                      <div className="mt-6 flex items-baseline gap-2">
                        <span className="text-5xl font-black text-stone-900 tracking-tighter">{totalProgressPercent}%</span>
                        <span className="text-xs text-stone-400 font-bold">({totalCompletedTasks}/{totalTasks} 완료)</span>
                      </div>
                      <div className="w-full bg-stone-100 h-2 rounded-full mt-4 overflow-hidden">
                        <div className="bg-[#9B6F43] h-full transition-all duration-500" style={{ width: `${totalProgressPercent}%` }} />
                      </div>
                    </div>

                    <div className="pt-4 border-t border-stone-100 grid grid-cols-3 gap-2 text-center text-xs">
                      <div className="bg-[#FAF9F6] p-3 rounded-xl border border-stone-100">
                        <div className="text-stone-400 font-bold">일일</div>
                        <div className="text-sm font-black text-stone-800 mt-1">{dailyDoneCount}/{dailyHomework.length}</div>
                      </div>
                      <div className="bg-[#FAF9F6] p-3 rounded-xl border border-stone-100">
                        <div className="text-stone-400 font-bold">12시간</div>
                        <div className="text-sm font-black text-stone-800 mt-1">{twelveHourDoneCount}/{twelveHourHomework.length}</div>
                      </div>
                      <div className="bg-[#FAF9F6] p-3 rounded-xl border border-stone-100">
                        <div className="text-stone-400 font-bold">주간</div>
                        <div className="text-sm font-black text-stone-800 mt-1">{weeklyDoneCount}/{weeklyHomework.length}</div>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                  {/* Resets monitors */}
                  <div className="lg:col-span-4 bg-white p-6 rounded-3xl border border-stone-100 shadow-sm space-y-4">
                    <span className="text-[10px] font-bold text-stone-400 block tracking-widest uppercase">⏰ RESETS TIMER</span>
                    <div className="space-y-2 text-xs">
                      <div className="flex justify-between items-center py-2 border-b">
                        <span className="font-bold text-stone-600">일일 0시 리셋</span>
                        <span className="font-mono text-rose-600 bg-rose-50 px-2.5 py-1 rounded-lg font-black">{getCountdownToMidnight(now)}</span>
                      </div>
                      <div className="flex justify-between items-center py-2 border-b">
                        <span className="font-bold text-stone-600">대난투 리셋 (12H)</span>
                        <span className="font-mono text-rose-600 bg-rose-50 px-2.5 py-1 rounded-lg font-black">{getCountdownToTwelveHour(now)}</span>
                      </div>
                      <div className="flex justify-between items-center py-2">
                        <span className="font-bold text-stone-600">주간 목요일 리셋</span>
                        <span className="bg-stone-100 text-stone-700 px-2.5 py-1 rounded-lg font-black">{getCountdownToThursday(now)}</span>
                      </div>
                    </div>
                  </div>

                  {/* Urgent monitors */}
                  <div className="lg:col-span-8 bg-white p-6 rounded-3xl border border-stone-100 shadow-sm flex flex-col justify-between">
                    <div>
                      <span className="text-[10px] font-bold text-stone-400 block tracking-widest uppercase">⌛ URGENT MONITOR</span>
                      <p className="text-xs text-amber-800 mt-1">남은시간 5분 미만 또는 수령 대기중인 타이머</p>
                    </div>

                    <div className="flex-1 mt-4">
                      {timers.filter(t => t.remainingSeconds <= 300).length === 0 ? (
                        <div className="text-center py-8 bg-[#FAF9F6] rounded-2xl border border-dashed border-stone-200 flex flex-col items-center justify-center">
                          <span className="text-lg">📭</span>
                          <p className="text-xs text-stone-400 font-bold mt-2">임박하거나 수집 대기 상태인 알림이 없습니다.</p>
                        </div>
                      ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[180px] overflow-y-auto">
                          {timers.filter(t => t.remainingSeconds <= 300).map(t => (
                            <div key={t.id} className="p-3 bg-[#FAF9F6] border border-stone-100 rounded-2xl flex justify-between items-center">
                              <div>
                                <p className="text-xs font-bold text-stone-800">{t.name}</p>
                                <span className="text-[9px] text-stone-400">기준: {formatSeconds(t.totalSeconds)}</span>
                              </div>
                              <span className="font-mono text-xs font-black text-rose-600">{formatSeconds(t.remainingSeconds)}</span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                </div>

                {/* Dashboard stand quick timer */}
                <div className="bg-gradient-to-tr from-[#F2ECE4] to-white p-6 rounded-3xl border border-stone-200/50 shadow-sm">
                  <div className="flex flex-col lg:flex-row justify-between items-stretch lg:items-center gap-6">
                    <div className="space-y-1.5 flex-1">
                      <h3 className="font-black text-stone-900 text-lg">🎯 개인용 퀵 타이머 직접 시간 기입 설정</h3>
                      <p className="text-xs text-stone-500">나만의 커스텀 초시계를 위해 원하는 [일/시/분/초]를 각각 숫자로 기입해 직접 세팅하세요.</p>
                      
                      <div className="flex flex-col sm:flex-row gap-3 mt-4">
                        <div className="flex flex-col gap-1">
                          <span className="text-[9px] font-bold text-stone-400">타이틀 이름</span>
                          <div className="flex gap-1">
                            <input type="text" value={quickTimerInputName} onChange={e => setQuickTimerInputName(e.target.value)} className="bg-white border rounded-xl px-3 py-2 text-xs font-bold w-full sm:w-44 focus:outline-none" />
                            <button onClick={handleSaveQuickTimerName} className="bg-stone-900 text-white text-xs px-3 rounded-xl font-bold">수정</button>
                          </div>
                        </div>

                        <div className="flex flex-col gap-1">
                          <span className="text-[9px] font-bold text-stone-400">작동 기준 시간 직접 입력</span>
                          <div className="flex items-center gap-1.5 flex-wrap">
                            <input type="number" value={quickTimerDays} onChange={e => setQuickTimerDays(e.target.value)} className="w-12 text-center bg-white border rounded-lg text-xs font-bold py-2 focus:outline-none" />
                            <span className="text-xs font-bold text-stone-400">일</span>
                            <input type="number" value={quickTimerHours} onChange={e => setQuickTimerHours(e.target.value)} className="w-12 text-center bg-white border rounded-lg text-xs font-bold py-2 focus:outline-none" />
                            <span className="text-xs font-bold text-stone-400">시</span>
                            <input type="number" value={quickTimerMinutes} onChange={e => setQuickTimerMinutes(e.target.value)} className="w-12 text-center bg-white border rounded-lg text-xs font-bold py-2 focus:outline-none" />
                            <span className="text-xs font-bold text-stone-400">분</span>
                            <input type="number" value={quickTimerSeconds} onChange={e => setQuickTimerSeconds(e.target.value)} className="w-12 text-center bg-white border rounded-lg text-xs font-bold py-2 focus:outline-none" />
                            <span className="text-xs font-bold text-stone-400">초</span>
                            <button onClick={handleApplyDirectQuickTimer} className="bg-amber-700 hover:bg-amber-800 text-white text-xs px-3 py-2 rounded-xl font-bold ml-1">시간 적용</button>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div className="bg-white p-5 rounded-2xl border border-stone-200 shadow-sm flex flex-col justify-between min-w-[280px]">
                      <div className="flex justify-between items-center w-full mb-3">
                        <div>
                          <p className="text-[9px] font-bold text-stone-400">{quickTimer.name}</p>
                          <p className="font-mono text-2xl font-black text-stone-900">{formatSeconds(quickTimer.remainingSeconds)}</p>
                        </div>
                        <div className="flex gap-1.5">
                          <button onClick={() => dispatchStateUpdate({ quickTimer: { ...quickTimer, isRunning: !quickTimer.isRunning } })} className="p-2.5 bg-[#FAF9F6] border border-stone-200 hover:bg-stone-100 rounded-xl transition-all flex items-center justify-center text-emerald-800">
                            {quickTimer.isRunning ? <PauseIcon /> : <PlayIcon />}
                          </button>
                          <button onClick={() => dispatchStateUpdate({ quickTimer: { ...quickTimer, remainingSeconds: quickTimer.totalSeconds, isRunning: false } })} className="p-2.5 bg-stone-50 hover:bg-stone-100 text-stone-600 rounded-xl transition-all flex items-center justify-center">
                            <RefreshIcon />
                          </button>
                        </div>
                      </div>
                      <div className="flex gap-1 overflow-x-auto w-full pt-3 border-t">
                        {[
                          { l: '+1분', v: 60 },
                          { l: '+5분', v: 300 },
                          { l: '+1시간', v: 3600 },
                          { l: '+1일', v: 86400 }
                        ].map(btn => (
                          <button key={btn.l} onClick={() => adjustQuickTimerBySeconds(btn.v)} className="text-[10px] font-bold bg-[#FAF9F6] text-stone-600 border rounded-lg px-2 py-1 shrink-0">{btn.l}</button>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* Tab 2. Homework Lists */}
            {activeTab === 'homework' && (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                {/* Daily HW */}
                <div className="bg-white p-6 rounded-3xl border shadow-sm flex flex-col">
                  <div className="border-b pb-4 flex justify-between items-center">
                    <h3 className="font-bold text-stone-900">🌅 일일 숙제</h3>
                    <span className="font-mono text-xs font-bold text-rose-600 bg-rose-50 px-2 py-0.5 rounded-full">{getCountdownToMidnight(now)}</span>
                  </div>
                  <div className="flex gap-1.5 py-3 border-b">
                    <button onClick={() => handleBulkCheck('daily', true)} className="flex-1 text-[10px] font-bold bg-stone-50 py-1 rounded">전체 완료</button>
                    <button onClick={() => handleBulkCheck('daily', false)} className="flex-1 text-[10px] font-bold bg-stone-50 py-1 rounded">전체 해제</button>
                  </div>
                  <form onSubmit={e => handleAddTask('daily', e)} className="flex gap-2 py-3">
                    <input type="text" placeholder="+ 숙제 등록" value={newDailyName} onChange={e => setNewDailyName(e.target.value)} className="flex-1 border text-xs px-3 py-2 rounded-xl focus:outline-none" />
                    <button type="submit" className="bg-stone-900 text-white rounded-xl px-3 text-xs font-bold">+</button>
                  </form>
                  <div className="space-y-2 mt-2 max-h-[400px] overflow-y-auto">
                    {getSortedHomework(dailyHomework).map(item => (
                      <div key={item.id} className={`p-3 rounded-xl border flex justify-between items-start gap-2 ${item.done ? 'opacity-40 bg-stone-50' : 'bg-white'}`}>
                        <label className="flex items-start gap-2.5 cursor-pointer flex-1">
                          <input type="checkbox" checked={item.done} onChange={() => toggleDaily(item.id)} className="mt-0.5" />
                          <div className="text-xs">
                            <p className={`font-bold ${item.done ? 'line-through text-stone-400' : 'text-stone-800'}`}>{item.name}</p>
                            <input type="text" placeholder="메모..." value={item.memo || ''} onChange={e => handleUpdateMemo('daily', item.id, e.target.value)} className="w-full bg-transparent text-[9px] text-stone-400 mt-1 focus:outline-none" />
                          </div>
                        </label>
                        <button onClick={() => handleDeleteTask('daily', item.id)} className="text-stone-300 hover:text-rose-600"><TrashIcon className="w-3.5 h-3.5" /></button>
                      </div>
                    ))}
                  </div>
                </div>

                {/* 12H HW */}
                <div className="bg-white p-6 rounded-3xl border shadow-sm flex flex-col">
                  <div className="border-b pb-4 flex justify-between items-center">
                    <h3 className="font-bold text-stone-900">⚔️ 12시간 숙제</h3>
                    <span className="font-mono text-xs font-bold text-rose-600 bg-rose-50 px-2 py-0.5 rounded-full">{getCountdownToTwelveHour(now)}</span>
                  </div>
                  <div className="flex gap-1.5 py-3 border-b">
                    <button onClick={() => handleBulkCheck('12h', true)} className="flex-1 text-[10px] font-bold bg-stone-50 py-1 rounded">전체 완료</button>
                    <button onClick={() => handleBulkCheck('12h', false)} className="flex-1 text-[10px] font-bold bg-stone-50 py-1 rounded">전체 해제</button>
                  </div>
                  <form onSubmit={e => handleAddTask('12h', e)} className="flex gap-2 py-3">
                    <input type="text" placeholder="+ 숙제 등록" value={newTwelveName} onChange={e => setNewTwelveName(e.target.value)} className="flex-1 border text-xs px-3 py-2 rounded-xl focus:outline-none" />
                    <button type="submit" className="bg-stone-900 text-white rounded-xl px-3 text-xs font-bold">+</button>
                  </form>
                  <div className="space-y-2 mt-2 max-h-[400px] overflow-y-auto">
                    {getSortedHomework(twelveHourHomework).map(item => (
                      <div key={item.id} className={`p-3 rounded-xl border flex justify-between items-start gap-2 ${item.done ? 'opacity-40 bg-stone-50' : 'bg-white'}`}>
                        <label className="flex items-start gap-2.5 cursor-pointer flex-1">
                          <input type="checkbox" checked={item.done} onChange={() => toggleTwelveHour(item.id)} className="mt-0.5" />
                          <div className="text-xs">
                            <p className={`font-bold ${item.done ? 'line-through text-stone-400' : 'text-stone-800'}`}>{item.name}</p>
                            <input type="text" placeholder="메모..." value={item.memo || ''} onChange={e => handleUpdateMemo('12h', item.id, e.target.value)} className="w-full bg-transparent text-[9px] text-stone-400 mt-1 focus:outline-none" />
                          </div>
                        </label>
                        <button onClick={() => handleDeleteTask('12h', item.id)} className="text-stone-300 hover:text-rose-600"><TrashIcon className="w-3.5 h-3.5" /></button>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Weekly HW */}
                <div className="bg-white p-6 rounded-3xl border shadow-sm flex flex-col">
                  <div className="border-b pb-4 flex justify-between items-center">
                    <h3 className="font-bold text-stone-900">🛡️ 주간 숙제</h3>
                    <span className="font-mono text-xs font-bold text-stone-600 bg-stone-100 px-2.5 py-0.5 rounded-full">{getCountdownToThursday(now)}</span>
                  </div>
                  <div className="flex gap-1.5 py-3 border-b">
                    <button onClick={() => handleBulkCheck('weekly', true)} className="flex-1 text-[10px] font-bold bg-stone-50 py-1 rounded">전체 완료</button>
                    <button onClick={() => handleBulkCheck('weekly', false)} className="flex-1 text-[10px] font-bold bg-stone-50 py-1 rounded">전체 해제</button>
                  </div>
                  <form onSubmit={e => handleAddTask('weekly', e)} className="flex gap-2 py-3">
                    <input type="text" placeholder="+ 숙제 등록" value={newWeeklyName} onChange={e => setNewWeeklyName(e.target.value)} className="flex-1 border text-xs px-3 py-2 rounded-xl focus:outline-none" />
                    <button type="submit" className="bg-stone-900 text-white rounded-xl px-3 text-xs font-bold">+</button>
                  </form>
                  <div className="space-y-2 mt-2 max-h-[400px] overflow-y-auto font-noto">
                    {getSortedHomework(weeklyHomework).map(item => (
                      <div key={item.id} className={`p-3 rounded-xl border flex justify-between items-start gap-2 ${item.done ? 'opacity-40 bg-stone-50' : 'bg-white'}`}>
                        <label className="flex items-start gap-2.5 cursor-pointer flex-1">
                          <input type="checkbox" checked={item.done} onChange={() => toggleWeekly(item.id)} className="mt-0.5" />
                          <div className="text-xs">
                            <p className={`font-bold ${item.done ? 'line-through text-stone-400' : 'text-stone-800'}`}>{item.name}</p>
                            <input type="text" placeholder="메모..." value={item.memo || ''} onChange={e => handleUpdateMemo('weekly', item.id, e.target.value)} className="w-full bg-transparent text-[9px] text-stone-400 mt-1 focus:outline-none" />
                          </div>
                        </label>
                        <button onClick={() => handleDeleteTask('weekly', item.id)} className="text-stone-300 hover:text-rose-600"><TrashIcon className="w-3.5 h-3.5" /></button>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* Tab 3. Currency Simulator */}
            {activeTab === 'currency' && (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                {computedCurrencies.map(c => (
                  <div key={c.id} className={`bg-white rounded-3xl border p-6 shadow-sm flex flex-col justify-between ${!c.isActive && 'opacity-40'}`}>
                    <div className="flex justify-between items-center mb-4">
                      <span className="font-bold text-stone-800">{c.name}</span>
                      <button onClick={() => handleToggleCurrencyActive(c.id)} className="text-[10px] bg-stone-100 px-2 py-1 rounded">{c.isActive ? '끄기' : '켜기'}</button>
                    </div>
                    {c.isActive && (
                      <div className="space-y-4">
                        <div className="bg-stone-50 p-4 rounded-2xl border flex justify-between items-center font-mono">
                          <input type="number" value={c.current} onChange={e => handleUpdateCurrencyCurrent(c.id, e.target.value)} className="w-16 bg-transparent text-lg font-bold focus:outline-none" />
                          <span className="text-stone-400">/</span>
                          <input type="number" value={c.max} onChange={e => handleUpdateCurrencyMax(c.id, e.target.value)} className="w-16 bg-transparent text-right text-lg font-bold focus:outline-none" />
                        </div>
                        <div className="flex justify-between text-xs text-stone-500">
                          <span>충전 속도 (분):</span>
                          <input type="number" value={c.rechargeTimeMinutes} onChange={e => handleUpdateCurrencyMinutes(c.id, e.target.value)} className="w-12 text-center bg-stone-50 border rounded" />
                        </div>
                        <div className="pt-4 border-t text-xs space-y-1.5 font-semibold text-stone-600">
                          <div className="flex justify-between"><span>실시간 동기화 수량:</span><span className="text-stone-900 font-black">{c.liveCurrent}</span></div>
                          <div className="flex justify-between"><span>다음 충전까지:</span><span className="text-stone-900">{c.secondsToNext}초</span></div>
                          <div className="flex justify-between"><span>완전 충전까지:</span><span className="text-rose-600 font-bold">{formatSeconds(c.secondsToFull)}</span></div>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}

            {/* Tab 4. Timer Accel Center */}
            {activeTab === 'timer' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="bg-white p-6 rounded-3xl border shadow-sm h-fit space-y-4">
                  <h3 className="font-bold text-stone-900">➕ 새 가속 타이머 등록</h3>
                  <form onSubmit={handleAddCustomTimer} className="space-y-3">
                    <input type="text" placeholder="초시계 명칭" value={customTimerName} onChange={e => setCustomTimerName(e.target.value)} className="w-full border text-xs p-3 rounded-xl focus:outline-none" />
                    <div className="grid grid-cols-3 gap-1.5">
                      <input type="number" placeholder="일" value={customTimerDays} onChange={e => setCustomTimerDays(e.target.value)} className="border p-2.5 rounded-lg text-center text-xs focus:outline-none" />
                      <input type="number" placeholder="시" value={customTimerHours} onChange={e => setCustomTimerHours(e.target.value)} className="border p-2.5 rounded-lg text-center text-xs focus:outline-none" />
                      <input type="number" placeholder="분" value={customTimerMinutes} onChange={e => setCustomTimerMinutes(e.target.value)} className="border p-2.5 rounded-lg text-center text-xs focus:outline-none" />
                    </div>
                    <button type="submit" className="w-full bg-stone-900 text-white text-xs font-bold py-3 rounded-xl">타이머 등록</button>
                  </form>
                </div>

                <div className="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4">
                  {timers.map(t => (
                    <div key={t.id} className="bg-white rounded-3xl border p-4 shadow-sm flex flex-col justify-between">
                      <div className="flex justify-between items-center mb-2">
                        <span className="font-bold text-xs text-stone-800">{t.name}</span>
                        <div className="flex gap-1">
                          <button onClick={() => t.isRunning ? pauseTimer(t.id) : startTimer(t.id)} className="p-1 bg-stone-50 rounded hover:bg-stone-100 text-stone-600">
                            {t.isRunning ? <PauseIcon /> : <PlayIcon />}
                          </button>
                          <button onClick={() => resetTimer(t.id)} className="p-1 bg-stone-50 rounded hover:bg-stone-100 text-stone-500"><RefreshIcon /></button>
                        </div>
                      </div>
                      <div className="my-2">
                        <p className="font-mono text-sm font-black text-stone-900">{formatSeconds(t.remainingSeconds)} <span className="text-[10px] text-stone-400">/ {formatSeconds(t.totalSeconds)}</span></p>
                      </div>
                      <div className="flex gap-1 mt-2 pt-2 border-t text-[9px] font-bold overflow-x-auto">
                        <button onClick={() => accelerateTimer(t.id, 10)} className="bg-stone-50 border rounded-lg px-2 py-1 shrink-0">-10분</button>
                        <button onClick={() => accelerateTimer(t.id, 30)} className="bg-stone-50 border rounded-lg px-2 py-1 shrink-0">-30분</button>
                        <button onClick={() => accelerateTimer(t.id, 60)} className="bg-stone-50 border rounded-lg px-2 py-1 shrink-0">-1시간</button>
                        <button onClick={() => {
                          setPromptConfig({
                            isOpen: true,
                            title: "직접 단축 시간 설정",
                            placeholder: "단축할 시간(분 단위 정수)",
                            value: "10",
                            onConfirm: (val) => accelerateTimer(t.id, parseInt(val) || 0)
                          });
                        }} className="bg-stone-900 text-white rounded-lg px-2 py-1 shrink-0">직접 입력</button>
                        {!t.preset && <button onClick={() => handleDeleteTimer(t.id)} className="bg-rose-50 text-rose-600 border border-rose-200 rounded-lg px-2 py-1 ml-auto shrink-0">삭제</button>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </main>

          {/* Modal Components */}
          {promptConfig.isOpen && (
            <div className="fixed inset-0 z-[200] bg-stone-900/40 backdrop-blur-sm flex items-center justify-center p-4 font-noto">
              <div className="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4">
                <h4 className="font-bold text-stone-800 text-base">{promptConfig.title}</h4>
                <input type="number" placeholder={promptConfig.placeholder} value={promptConfig.value} onChange={e => setPromptConfig({ ...promptConfig, value: e.target.value })} className="w-full border p-3 rounded-xl focus:outline-none" />
                <div className="flex gap-2 justify-end">
                  <button onClick={() => setPromptConfig({ ...promptConfig, isOpen: false })} className="px-4 py-2 border rounded-xl text-xs font-bold hover:bg-stone-50">취소</button>
                  <button onClick={() => { promptConfig.onConfirm(promptConfig.value); setPromptConfig({ ...promptConfig, isOpen: false }); }} className="px-4 py-2 bg-stone-900 text-white rounded-xl text-xs font-bold">적용</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- Clipboard iFrame Copy Aligner ---
    function copyToClipboard(text) {
      const textField = document.createElement('textarea');
      textField.innerText = text;
      document.body.appendChild(textField);
      textField.select();
      document.execCommand('copy');
      textField.remove();
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
