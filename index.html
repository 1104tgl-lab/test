<head>

<body class="bg-[#F9F7F4] text-[#2D2A26] antialiased min-h-screen relative overflow-x-hidden">

  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const { useState, useEffect } = React;

    // Firebase 환경 설정
    const firebaseConfig = {
      apiKey: "AIzaSyAXmJV32uI09REQhZnaUSf17yD13U_AGdE",
      authDomain: "copr-5d01f.firebaseapp.com",
      projectId: "copr-5d01f",
      storageBucket: "copr-5d01f.firebasestorage.app",
      messagingSenderId: "165126350954",
      appId: "1:165126350954:web:6e00464d962daf2520c213",
      measurementId: "G-SYP80ET0TQ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const appId = 'copr-5d01f';

    // --- 헬퍼 함수 정의 ---
    const getSortedHomework = (list) => {
      if (!list) return [];
      return [...list].sort((a, b) => {
        if (a.important && !b.important) return -1;
        if (!a.important && b.important) return 1;
        if (!a.done && b.done) return -1;
        if (a.done && !b.done) return 1;
        return 0;
      });
    };

    const formatSeconds = (totalSec) => {
      if (totalSec <= 0) return '완료!';
      const days = Math.floor(totalSec / 86400);
      const hrs = Math.floor((totalSec % 86400) / 3600);
      const mins = Math.floor((totalSec % 3600) / 60);
      const secs = totalSec % 60;
      return `${days > 0 ? days + '일 ' : ''}${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    };

    const getCountdownToMidnight = (now) => {
      const midnight = new Date(now);
      midnight.setHours(24, 0, 0, 0);
      const diff = midnight.getTime() - now.getTime();
      if (diff <= 0) return "00:00:00";
      const hrs = Math.floor(diff / 3600000);
      const mins = Math.floor((diff % 3600000) / 60000);
      const secs = Math.floor((diff % 60000) / 1000);
      return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    };

    const getCountdownToTwelveHour = (now) => {
      const hours = now.getHours();
      const nextReset = new Date(now);
      if (hours < 12) {
        nextReset.setHours(12, 0, 0, 0);
      } else {
        nextReset.setHours(24, 0, 0, 0);
      }
      const diff = nextReset.getTime() - now.getTime();
      if (diff <= 0) return "00:00:00";
      const hrs = Math.floor(diff / 3600000);
      const mins = Math.floor((diff % 3600000) / 60000);
      const secs = Math.floor((diff % 60000) / 1000);
      return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    };

    const getCountdownToThursday = (now) => {
      const today = now.getDay();
      const daysUntilThursday = (4 - today + 7) % 7 || 7;
      const target = new Date(now);
      target.setDate(now.getDate() + daysUntilThursday);
      target.setHours(0, 0, 0, 0);

      const diff = target.getTime() - now.getTime();
      if (diff <= 0) return "리셋 완료";
      const days = Math.floor(diff / 86400000);
      const hrs = Math.floor((diff % 86400000) / 3600000);
      const mins = Math.floor((diff % 3600000) / 60000);
      return `${days}일 ${hrs}시간 ${mins}분`;
    };

    const getPostOfficeStatus = (now) => {
      const hour = now.getHours();
      const min = now.getMinutes();
      const sec = now.getSeconds();
      const currentPeriodHour = Math.floor(hour / 2) * 2;
      const isCurrentlyOpen = min < 20;

      if (isCurrentlyOpen) {
        return {
          isOpen: true,
          text: '광장 우체국 보상 수령 가능!',
          subText: `${19 - min}분 ${59 - sec}초 내 수령 필요`,
          currentWindow: `${currentPeriodHour}시 ~ ${currentPeriodHour}시 20분`
        };
      } else {
        const nextOpenHour = (currentPeriodHour + 2) % 24;
        let targetDate = new Date(now);
        targetDate.setHours(nextOpenHour, 0, 0, 0);
        if (nextOpenHour <= hour) targetDate.setDate(targetDate.getDate() + 1);
        const diffMs = targetDate.getTime() - now.getTime();
        const diffHr = Math.floor(diffMs / 3600000);
        const diffMin = Math.floor((diffMs % 3600000) / 60000);
        const diffSec = Math.floor((diffMs % 60000) / 1000);
        return {
          isOpen: false,
          text: '우체국 수령 대기 중',
          subText: `다음 개방: ${diffHr > 0 ? diffHr + '시간 ' : ''}${diffMin}분 ${diffSec}초 남음`,
          currentWindow: `${nextOpenHour}시 ~ ${nextOpenHour}시 20분`
        };
      }
    };

    const generateSyncCode = () => {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let code = 'CRK-';
      for (let i = 0; i < 6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
      return code;
    };

    const triggerNotification = (title, message) => {
      if (window.pywebview && window.pywebview.api && window.pywebview.api.notify) {
        window.pywebview.api.notify(title, message);
        return;
      }
      if (window.Notification && Notification.permission === "granted") {
        new Notification(title, { body: message });
      }
    };

    // --- 아이콘 컴포넌트 ---
    const TrashIcon = ({ className = "w-4 h-4" }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24">
        <polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" />
      </svg>
    );
    const PlayIcon = () => <svg className="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>;
    const PauseIcon = () => <svg className="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" /></svg>;
    const RefreshIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M23 4v6h-6" /><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" /></svg>;

    // --- 초기 데이터 데이터셋 (세부 재화 6종 복구) ---
    const INITIAL_DAILY = [
      { id: 1, name: '친구 선물 보내기', done: false, important: true, memo: '' },
      { id: 2, name: '무료 선물 받기', done: false, important: false, memo: '' },
      { id: 3, name: '무료 뽑기 재화', done: false, important: false, memo: '' },
      { id: 4, name: '현상수배 소탕/진행', done: false, important: true, memo: '' },
      { id: 5, name: '소원나무 3단계 수령', done: false, important: true, memo: '골드 2배 버프 타임 노리기!' },
      { id: 6, name: '해상무역센터 무역선 선적', done: false, important: false, memo: '' },
      { id: 7, name: '꿈꾸는 별무리섬 탐험', done: false, important: false, memo: '' },
      { id: 8, name: '광장 일일 퀘스트', done: false, important: false, memo: '' },
      { id: 9, name: '광장 잠수 버프 채우기', done: false, important: false, memo: '' },
      { id: 10, name: '광고 시청 (뽑기, 가속 등)', done: false, important: false, memo: '' },
    ];
    const INITIAL_TWELVE = [{ id: 101, name: '몬스터 대난투 참여', done: false, important: true, memo: '하루 2번 충전 체크' }];
    const INITIAL_WEEKLY = [
      { id: 201, name: '길드 토벌전 참여', done: false, important: true, memo: '' },
      { id: 202, name: '킹덤 아레나 리그 참여', done: false, important: true, memo: '' },
      { id: 203, name: '증명의 전장 완료', done: false, important: false, memo: '' }
    ];
    
    // 💡 6종 정밀 재화 설정값 원상태 복구
    const INITIAL_CURRENCIES = [
      { id: 'stamina_normal', name: '일반 스태미너', current: 50, max: 100, rechargeTimeMinutes: 5, isActive: true, lastUpdated: Date.now() },
      { id: 'stamina_thick', name: '두툼한 스태미너', current: 20, max: 50, rechargeTimeMinutes: 10, isActive: true, lastUpdated: Date.now() },
      { id: 'stamina_destiny', name: '운명의 스태미너', current: 10, max: 30, rechargeTimeMinutes: 18, isActive: true, lastUpdated: Date.now() },
      { id: 'arena', name: '아레나 티켓', current: 4, max: 8, rechargeTimeMinutes: 60, isActive: true, lastUpdated: Date.now() },
      { id: 'arcade_arena', name: '아케이드 아레나', current: 5, max: 10, rechargeTimeMinutes: 120, isActive: true, lastUpdated: Date.now() },
      { id: 'alliance', name: '수호의 성전', current: 2, max: 6, rechargeTimeMinutes: 720, isActive: true, lastUpdated: Date.now() }
    ];
    
    // 💡 필수 가속 타이머 8종 풀세트 복구
    const DEFAULT_TIMERS = [
      { id: 'fountain', name: '풍요의 분수', totalSeconds: 8 * 3600, remainingSeconds: 8 * 3600, isRunning: false, preset: true },
      { id: 'dock', name: '선착장 보상', totalSeconds: 8 * 3600, remainingSeconds: 8 * 3600, isRunning: false, preset: true },
      { id: 'train_1', name: '곰젤리 열차 1번', totalSeconds: 4 * 3600, remainingSeconds: 4 * 3600, isRunning: false, preset: true },
      { id: 'train_2', name: '곰젤리 열차 2번', totalSeconds: 6 * 3600, remainingSeconds: 6 * 3600, isRunning: false, preset: true },
      { id: 'balloon', name: '곰젤리 열기구', totalSeconds: 5 * 3600 + 46 * 60, remainingSeconds: 5 * 3600 + 46 * 60, isRunning: false, preset: true },
      { id: 'beach', name: '앵무의 해변교역소', totalSeconds: 6 * 3600, remainingSeconds: 6 * 3600, isRunning: false, preset: true },
      { id: 'mine_explore', name: '광산 탐험', totalSeconds: 8 * 3600, remainingSeconds: 8 * 3600, isRunning: false, preset: true },
      { id: 'mine_harvest', name: '광산 채굴', totalSeconds: 24 * 3600, remainingSeconds: 24 * 3600, isRunning: false, preset: true }
    ];

    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [now, setNow] = useState(new Date());
      const [user, setUser] = useState(null);
      const [syncCode, setSyncCode] = useState(() => localStorage.getItem('crk_sync_code_v3') || generateSyncCode());
      const [cloudStatus, setCloudStatus] = useState('authenticating');
      const [toastMessage, setToastMessage] = useState('');
      const [promptConfig, setPromptConfig] = useState({ isOpen: false, title: '', placeholder: '', value: '', onConfirm: null });

      // 상태 보존용 Hooks 호출
      const [dailyHomework, setDailyHomework] = useState(() => JSON.parse(localStorage.getItem('crk_local_daily_hw')) || INITIAL_DAILY);
      const [twelveHourHomework, setTwelveHourHomework] = useState(() => JSON.parse(localStorage.getItem('crk_local_12h_hw')) || INITIAL_TWELVE);
      const [weeklyHomework, setWeeklyHomework] = useState(() => JSON.parse(localStorage.getItem('crk_local_weekly_hw')) || INITIAL_WEEKLY);
      const [currencies, setCurrencies] = useState(() => JSON.parse(localStorage.getItem('crk_local_currencies')) || INITIAL_CURRENCIES);
      const [timers, setTimers] = useState(() => JSON.parse(localStorage.getItem('crk_local_timers')) || DEFAULT_TIMERS);
      const [postOfficeClaims, setPostOfficeClaims] = useState(() => JSON.parse(localStorage.getItem('crk_local_claims')) || { date: new Date().toDateString(), claims: [false, false, false] });

      const [quickTimer, setQuickTimer] = useState(() => JSON.parse(localStorage.getItem('crk_local_quick_timer')) || { name: '개인용 퀵 타이머 🎯', totalSeconds: 300, remainingSeconds: 300, isRunning: false });
      const [quickTimerInputName, setQuickTimerInputName] = useState('개인용 퀵 타이머 🎯');
      const [quickTimerDays, setQuickTimerDays] = useState('0');
      const [quickTimerHours, setQuickTimerHours] = useState('0');
      const [quickTimerMinutes, setQuickTimerMinutes] = useState('5');
      const [quickTimerSeconds, setQuickTimerSeconds] = useState('0');

      const [newDailyName, setNewDailyName] = useState('');
      const [newTwelveName, setNewTwelveName] = useState('');
      const [newWeeklyName, setNewWeeklyName] = useState('');
      
      const [customTimerName, setCustomTimerName] = useState('');
      const [customTimerDays, setCustomTimerDays] = useState('0');
      const [customTimerHours, setCustomTimerHours] = useState('0');
      const [customTimerMinutes, setCustomTimerMinutes] = useState('0');

      function showToast(message) {
        setToastMessage(message);
        setTimeout(() => setToastMessage(''), 2500);
      }

      // --- ⚙️ 실시간 무지연 카운트다운 루프 엔진 (재화 충전 자동 연산 결합) ---
      useEffect(() => {
        const interval = setInterval(() => {
          const currentTime = new Date();
          setNow(currentTime);

          // 1. 일반 가속 타이머 처리
          setTimers(prevTimers => {
            let changed = false;
            const nextTimers = prevTimers.map(t => {
              if (t.isRunning && t.remainingSeconds > 0) {
                changed = true;
                const updatedSeconds = t.remainingSeconds - 1;
                if (updatedSeconds === 0) {
                  triggerNotification("⏳ 타이머 완료!", `[${t.name}] 수령 시간이 되었습니다!`);
                }
                return { ...t, remainingSeconds: updatedSeconds };
              }
              return t;
            });
            if (changed) {
              localStorage.setItem('crk_local_timers', JSON.stringify(nextTimers));
              if (cloudStatus === 'connected') saveToCloud({ timers: nextTimers });
            }
            return nextTimers;
          });

          // 2. 퀵 타이머 처리
          setQuickTimer(prevQuick => {
            if (prevQuick.isRunning && prevQuick.remainingSeconds > 0) {
              const updatedSeconds = prevQuick.remainingSeconds - 1;
              const nextQuick = { ...prevQuick, remainingSeconds: updatedSeconds };
              if (updatedSeconds === 0) {
                triggerNotification("🎯 퀵 타이머 완료!", `[${prevQuick.name}] 설정 시간이 끝났습니다.`);
                nextQuick.isRunning = false;
              }
              localStorage.setItem('crk_local_quick_timer', JSON.stringify(nextQuick));
              if (cloudStatus === 'connected') saveToCloud({ quickTimer: nextQuick });
              return nextQuick;
            }
            return prevQuick;
          });
        }, 1000);

        return () => clearInterval(interval);
      }, [cloudStatus]);

      // --- ⚡ 실시간 재화 시뮬레이터 실시간 계산식 매핑 ---
      const computedCurrencies = currencies.map(c => {
        if (c.current >= c.max || !c.isActive) return { ...c, liveCurrent: c.current, secondsToNext: 0, secondsToFull: 0 };
        const msPerUnit = c.rechargeTimeMinutes * 60 * 1000;
        const elapsedMs = now.getTime() - c.lastUpdated;
        const gainedUnits = Math.floor(elapsedMs / msPerUnit);
        const liveCurrent = Math.min(c.max, c.current + gainedUnits);
        let secondsToNext = 0, secondsToFull = 0;
        if (liveCurrent < c.max) {
          secondsToNext = Math.ceil((msPerUnit - (elapsedMs % msPerUnit)) / 1000);
          secondsToFull = Math.ceil(((c.max - liveCurrent) * msPerUnit - (elapsedMs % msPerUnit)) / 1000);
        }
        return { ...c, liveCurrent, secondsToNext, secondsToFull };
      });

      async function saveToCloud(newData) {
        if (!user || cloudStatus !== 'connected') return;
        try {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'kingdoms', syncCode);
          await setDoc(docRef, {
            dailyHomework: newData.dailyHomework ?? dailyHomework,
            twelveHourHomework: newData.twelveHourHomework ?? twelveHourHomework,
            weeklyHomework: newData.weeklyHomework ?? weeklyHomework,
            currencies: newData.currencies ?? currencies,
            timers: newData.timers ?? timers,
            postOfficeClaims: newData.postOfficeClaims ?? postOfficeClaims,
            quickTimer: newData.quickTimer ?? quickTimer,
            lastUpdatedTime: Date.now()
          }, { merge: true });
        } catch (e) {
          console.error(e);
        }
      }

      function dispatchStateUpdate(updates) {
        if (updates.dailyHomework !== undefined) { setDailyHomework(updates.dailyHomework); localStorage.setItem('crk_local_daily_hw', JSON.stringify(updates.dailyHomework)); }
        if (updates.twelveHourHomework !== undefined) { setTwelveHourHomework(updates.twelveHourHomework); localStorage.setItem('crk_local_12h_hw', JSON.stringify(updates.twelveHourHomework)); }
        if (updates.weeklyHomework !== undefined) { setWeeklyHomework(updates.weeklyHomework); localStorage.setItem('crk_local_weekly_hw', JSON.stringify(updates.weeklyHomework)); }
        if (updates.currencies !== undefined) { setCurrencies(updates.currencies); localStorage.setItem('crk_local_currencies', JSON.stringify(updates.currencies)); }
        if (updates.timers !== undefined) { setTimers(updates.timers); localStorage.setItem('crk_local_timers', JSON.stringify(updates.timers)); }
        if (updates.postOfficeClaims !== undefined) { setPostOfficeClaims(updates.postOfficeClaims); localStorage.setItem('crk_local_claims', JSON.stringify(updates.postOfficeClaims)); }
        if (updates.quickTimer !== undefined) { setQuickTimer(updates.quickTimer); localStorage.setItem('crk_local_quick_timer', JSON.stringify(updates.quickTimer)); }
        saveToCloud(updates);
      }

      // 조작 제어 함수군
      function startTimer(id) { dispatchStateUpdate({ timers: timers.map(t => t.id === id ? { ...t, isRunning: true } : t) }); }
      function pauseTimer(id) { dispatchStateUpdate({ timers: timers.map(t => t.id === id ? { ...t, isRunning: false } : t) }); }
      function resetTimer(id) { dispatchStateUpdate({ timers: timers.map(t => t.id === id ? { ...t, remainingSeconds: t.totalSeconds, isRunning: false } : t) }); }
      
      function accelerateTimer(id, minutesToSkip) {
        dispatchStateUpdate({ timers: timers.map(t => t.id === id ? { ...t, remainingSeconds: Math.max(0, t.remainingSeconds - minutesToSkip * 60) } : t) });
      }
      
      function adjustQuickTimerBySeconds(seconds) {
        const newRemaining = Math.max(0, quickTimer.remainingSeconds + seconds);
        dispatchStateUpdate({ quickTimer: { ...quickTimer, remainingSeconds: newRemaining } });
      }

      function handleApplyDirectQuickTimer() {
        const totalSecs = (parseInt(quickTimerDays) || 0) * 86400 + (parseInt(quickTimerHours) || 0) * 3600 + (parseInt(quickTimerMinutes) || 0) * 60 + (parseInt(quickTimerSeconds) || 0);
        if (totalSecs <= 0) return;
        dispatchStateUpdate({ quickTimer: { ...quickTimer, totalSeconds: totalSecs, remainingSeconds: totalSecs, isRunning: false } });
        showToast("🎯 설정이 완료되었습니다.");
      }

      function handleSaveQuickTimerName() {
        dispatchStateUpdate({ quickTimer: { ...quickTimer, name: quickTimerInputName } });
        showToast("🎯 이름이 수정되었습니다.");
      }

      // 💡 오류 고쳐진 새 가속 타이머 직접 등록 연산 (일, 시간, 분 결합 적용)
      function handleAddCustomTimer(e) {
        e.preventDefault();
        if (!customTimerName.trim()) return;
        const totalSecs = (parseInt(customTimerDays) || 0) * 86400 + (parseInt(customTimerHours) || 0) * 3600 + (parseInt(customTimerMinutes) || 0) * 60;
        if (totalSecs <= 0) {
          showToast("⚠️ 시간을 올바르게 입력해 주세요.");
          return;
        }
        const newTimer = { id: 'custom_' + Date.now(), name: customTimerName.trim(), totalSeconds: totalSecs, remainingSeconds: totalSecs, isRunning: false, preset: false };
        dispatchStateUpdate({ timers: [...timers, newTimer] });
        setCustomTimerName('');
        setCustomTimerDays('0');
        setCustomTimerHours('0');
        setCustomTimerMinutes('0');
        showToast("⏳ 새 커스텀 타이머가 생성되었습니다.");
      }

      function handleDeleteTimer(id) { dispatchStateUpdate({ timers: timers.filter(t => t.id !== id) }); }

      // ⚡ 재화 수동 수정 반영용 제어 컨트롤러들
      const handleUpdateCurrencyCurrent = (id, val) => {
        dispatchStateUpdate({ currencies: currencies.map(c => c.id === id ? { ...c, current: parseInt(val) || 0, lastUpdated: Date.now() } : c) });
      };
      const handleUpdateCurrencyMax = (id, val) => {
        dispatchStateUpdate({ currencies: currencies.map(c => c.id === id ? { ...c, max: parseInt(val) || 0, lastUpdated: Date.now() } : c) });
      };
      const handleUpdateCurrencyMinutes = (id, val) => {
        dispatchStateUpdate({ currencies: currencies.map(c => c.id === id ? { ...c, rechargeTimeMinutes: parseInt(val) || 1, lastUpdated: Date.now() } : c) });
      };
      const handleToggleCurrencyActive = (id) => {
        dispatchStateUpdate({ currencies: currencies.map(c => c.id === id ? { ...c, isActive: !c.isActive, lastUpdated: Date.now() } : c) });
      };

      useEffect(() => {
        signInAnonymously(auth).catch(() => setCloudStatus('local'));
        onAuthStateChanged(auth, (usr) => { if (usr) setUser(usr); });
        localStorage.setItem('crk_sync_code_v3', syncCode);
      }, [syncCode]);

      useEffect(() => {
        if (!user) return;
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'kingdoms', syncCode);
        const unsubscribe = onSnapshot(docRef, (snapshot) => {
          if (snapshot.exists()) {
            const data = snapshot.data();
            if (data.dailyHomework) setDailyHomework(data.dailyHomework);
            if (data.twelveHourHomework) setTwelveHourHomework(data.twelveHourHomework);
            if (data.weeklyHomework) setWeeklyHomework(data.weeklyHomework);
            if (data.currencies) setCurrencies(data.currencies);
            if (data.timers) setTimers(data.timers);
            if (data.quickTimer) setQuickTimer(data.quickTimer);
            if (data.postOfficeClaims) setPostOfficeClaims(data.postOfficeClaims);
            setCloudStatus('connected');
          } else {
            saveToCloud({ dailyHomework, twelveHourHomework, weeklyHomework, currencies, timers, postOfficeClaims, quickTimer });
            setCloudStatus('connected');
          }
        }, () => setCloudStatus('api-disabled'));
        return () => unsubscribe();
      }, [user, syncCode]);

      // 구조 파악 연산
      const dailyDoneCount = dailyHomework.filter(i => i.done).length;
      const twelveHourDoneCount = twelveHourHomework.filter(i => i.done).length;
      const weeklyDoneCount = weeklyHomework.filter(i => i.done).length;
      const totalTasks = dailyHomework.length + twelveHourHomework.length + weeklyHomework.length;
      const totalCompletedTasks = dailyDoneCount + twelveHourDoneCount + weeklyDoneCount;
      const totalProgressPercent = totalTasks > 0 ? Math.round((totalCompletedTasks / totalTasks) * 100) : 0;
      const postOfficeStatus = getPostOfficeStatus(now);

      const handleBulkCheck = (type, state) => {
        const bulk = (list) => list.map(item => ({ ...item, done: state }));
        if (type === 'daily') dispatchStateUpdate({ dailyHomework: bulk(dailyHomework) });
        if (type === '12h') dispatchStateUpdate({ twelveHourHomework: bulk(twelveHourHomework) });
        if (type === 'weekly') dispatchStateUpdate({ weeklyHomework: bulk(weeklyHomework) });
      };

      const handleAddTask = (type, e) => {
        e.preventDefault();
        if (type === 'daily' && newDailyName.trim()) { dispatchStateUpdate({ dailyHomework: [...dailyHomework, { id: Date.now(), name: newDailyName.trim(), done: false, important: false, memo: '' }] }); setNewDailyName(''); }
        if (type === '12h' && newTwelveName.trim()) { dispatchStateUpdate({ twelveHourHomework: [...twelveHourHomework, { id: Date.now(), name: newTwelveName.trim(), done: false, important: false, memo: '' }] }); setNewTwelveName(''); }
        if (type === 'weekly' && newWeeklyName.trim()) { dispatchStateUpdate({ weeklyHomework: [...weeklyHomework, { id: Date.now(), name: newWeeklyName.trim(), done: false, important: false, memo: '' }] }); setNewWeeklyName(''); }
      };

      const handleDeleteTask = (type, id) => {
        if (type === 'daily') dispatchStateUpdate({ dailyHomework: dailyHomework.filter(i => i.id !== id) });
        if (type === '12h') dispatchStateUpdate({ twelveHourHomework: twelveHourHomework.filter(i => i.id !== id) });
        if (type === 'weekly') dispatchStateUpdate({ weeklyHomework: weeklyHomework.filter(i => i.id !== id) });
      };

      return (
        <div className="min-h-screen bg-[#F9F7F4] text-[#2D2A26] antialiased pb-20 px-4 md:px-8">
          {toastMessage && (
            <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[150] bg-stone-900 text-stone-100 px-5 py-3 rounded-2xl shadow-xl font-bold animate-bounce text-sm">
              {toastMessage}
            </div>
          )}

          <header className="max-w-7xl mx-auto pt-10 pb-6 flex flex-col md:flex-row justify-between items-center gap-4 border-b border-stone-200">
            <div>
              <h1 className="text-2xl font-black flex items-center gap-2 text-stone-900 tracking-tight">
                🍪 쿠키런: 킹덤 오버플래너
                {cloudStatus === 'connected' ? (
                  <span className="bg-emerald-600 text-white text-[10px] px-2 py-0.5 rounded-full uppercase font-black">CLOUD LIVE</span>
                ) : (
                  <span className="bg-rose-600 text-white text-[10px] px-2 py-0.5 rounded-full uppercase font-black">CONNECTING / LOCAL</span>
                )}
              </h1>
            </div>
            <div className="flex gap-2 items-center">
              <div className="bg-white px-4 py-2 border rounded-xl shadow-sm">
                <span className="text-[9px] font-bold text-stone-400 block">SYNC CODE</span>
                <span className="font-mono text-sm font-black text-stone-800">{syncCode}</span>
              </div>
              <button onClick={() => { copyToClipboard(syncCode); showToast("📋 코드가 복사되었습니다!"); }} className="bg-stone-900 text-white text-xs px-4 py-3 rounded-xl font-bold">코드 복사</button>
            </div>
          </header>

          <nav className="max-w-7xl mx-auto mt-6 sticky top-4 z-50">
            <div className="bg-white/80 backdrop-blur-xl border p-1.5 rounded-2xl shadow-md max-w-xl mx-auto">
              <div className="grid grid-cols-4 gap-1">
                {[['dashboard', '📊 대시보드'], ['homework', '📅 숙제 패널'], ['currency', '⚡ 재화 설정'], ['timer', '⏳ 가속 센터']].map(([id, label]) => (
                  <button key={id} onClick={() => setActiveTab(id)} className={`py-2 text-xs font-bold rounded-xl transition-all ${activeTab === id ? 'bg-stone-900 text-white shadow-md' : 'text-stone-600 hover:bg-stone-100'}`}>{label}</button>
                ))}
              </div>
            </div>
          </nav>

          <main className="max-w-7xl mx-auto mt-8">
            {/* 1. 대시보드 뷰 */}
            {activeTab === 'dashboard' && (
              <div className="space-y-6">
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                  {/* 광장 우체국 */}
                  <div className="lg:col-span-7 bg-white p-6 rounded-3xl border shadow-sm flex flex-col justify-between">
                    <div>
                      <span className="text-[10px] font-bold text-stone-400 tracking-widest uppercase block">📮 POST OFFICE MONITOR</span>
                      <h2 className="text-xl font-bold mt-4 text-stone-800">{postOfficeStatus.text}</h2>
                      <p className="text-xs text-stone-400 mt-1">창구 개방 시간: {postOfficeStatus.currentWindow}</p>
                      <div className="bg-[#FAF9F6] p-4 rounded-2xl border border-stone-200/50 mt-4">
                        <div className="flex justify-between items-center text-xs font-bold text-stone-700">
                          <span>개방 진행상황</span>
                          <span className="text-amber-700">{postOfficeStatus.subText}</span>
                        </div>
                        <div className="w-full bg-stone-200/50 h-2 rounded-full mt-2 overflow-hidden">
                          <div className={`h-full transition-all duration-1000 ${postOfficeStatus.isOpen ? 'bg-emerald-500' : 'bg-amber-600'}`} style={{ width: postOfficeStatus.isOpen ? '100%' : '50%' }} />
                        </div>
                      </div>
                    </div>
                    <div className="mt-6 pt-4 border-t border-stone-100 grid grid-cols-3 gap-2">
                      {[0, 1, 2].map(idx => (
                        <button
                          key={idx}
                          onClick={() => {
                            const claims = [...postOfficeClaims.claims];
                            claims[idx] = !claims[idx];
                            dispatchStateUpdate({ postOfficeClaims: { ...postOfficeClaims, claims } });
                          }}
                          className={`py-3 rounded-xl text-xs font-bold transition-all border ${
                            postOfficeClaims.claims[idx] ? 'bg-stone-900 border-stone-900 text-white shadow-sm' : 'bg-[#FAF9F6] border-stone-200 text-stone-600 hover:bg-stone-100/60'
                          }`}
                        >
                          {idx + 1}회 수령 {postOfficeClaims.claims[idx] ? '✓' : '대기'}
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* 프로그레스 패널 */}
                  <div className="lg:col-span-5 bg-white p-6 rounded-3xl border shadow-sm flex flex-col justify-between">
                    <div>
                      <span className="text-[10px] font-bold text-stone-400 tracking-widest uppercase block">📊 PROGRESS PANEL</span>
                      <div className="mt-6 flex items-baseline gap-2">
                        <span className="text-5xl font-black text-stone-900 tracking-tighter">{totalProgressPercent}%</span>
                        <span className="text-xs text-stone-400 font-bold">({totalCompletedTasks}/{totalTasks} 완료)</span>
                      </div>
                      <div className="w-full bg-stone-100 h-2 rounded-full mt-4 overflow-hidden">
                        <div className="bg-[#9B6F43] h-full transition-all duration-500" style={{ width: `${totalProgressPercent}%` }} />
                      </div>
                    </div>
                    <div className="pt-4 border-t border-stone-100 grid grid-cols-3 gap-2 text-center text-xs">
                      <div className="bg-[#FAF9F6] p-3 rounded-xl border border-stone-100">
                        <div className="text-stone-400 font-bold">일일</div>
                        <div className="text-sm font-black text-stone-800 mt-1">{dailyDoneCount}/{dailyHomework.length}</div>
                      </div>
                      <div className="bg-[#FAF9F6] p-3 rounded-xl border border-stone-100">
                        <div className="text-stone-400 font-bold">12시간</div>
                        <div className="text-sm font-black text-stone-800 mt-1">{twelveHourDoneCount}/{twelveHourHomework.length}</div>
                      </div>
                      <div className="bg-[#FAF9F6] p-3 rounded-xl border border-stone-100">
                        <div className="text-stone-400 font-bold">주간</div>
                        <div className="text-sm font-black text-stone-800 mt-1">{weeklyDoneCount}/{weeklyHomework.length}</div>
                      </div>
                    </div>
                  </div>
                </div>

                {/* 💡 대시보드 뷰 하단 영역에 실시간 동기화 재화 대시보드 복구 */}
                <div className="bg-white p-6 rounded-3xl border shadow-sm space-y-3">
                  <span className="text-[10px] font-bold text-stone-400 block tracking-widest uppercase">⚡ REALTIME CURRENCY DASHBOARD</span>
                  <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                    {computedCurrencies.map(c => (
                      <div key={c.id} className={`p-4 rounded-2xl border ${c.isActive ? 'bg-[#FAF9F6] border-stone-200/60' : 'bg-stone-50 opacity-40'}`}>
                        <p className="text-[11px] font-bold text-stone-500">{c.name}</p>
                        <p className="text-xl font-black text-stone-900 mt-1.5 font-mono">{c.liveCurrent} <span className="text-xs text-stone-400 font-normal">/ {c.max}</span></p>
                        {c.isActive && c.liveCurrent < c.max && (
                          <div className="mt-2 text-[9px] text-stone-400 font-medium font-sans space-y-0.5">
                            <div>다음충전: {c.secondsToNext}초</div>
                            <div className="text-rose-600 font-bold">완충: {formatSeconds(c.secondsToFull)}</div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>

                {/* 리셋 모드 시간판과 임박 알림 센터 */}
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                  <div className="lg:col-span-5 bg-white p-6 rounded-3xl border shadow-sm space-y-4 flex flex-col justify-center">
                    <span className="text-[10px] font-bold text-stone-400 block tracking-widest uppercase">⏰ RESETS TIMER</span>
                    <div className="space-y-2 text-xs">
                      <div className="flex justify-between items-center py-2 border-b">
                        <span className="font-bold text-stone-600">일일 0시 리셋</span>
                        <span className="font-mono text-rose-600 bg-rose-50 px-2.5 py-1 rounded-lg font-black">{getCountdownToMidnight(now)}</span>
                      </div>
                      <div className="flex justify-between items-center py-2 border-b">
                        <span className="font-bold text-stone-600">대난투 리셋 (12H)</span>
                        <span className="font-mono text-rose-600 bg-rose-50 px-2.5 py-1 rounded-lg font-black">{getCountdownToTwelveHour(now)}</span>
                      </div>
                      <div className="flex justify-between items-center py-2">
                        <span className="font-bold text-stone-600">주간 목요일 리셋</span>
                        <span className="bg-stone-100 text-stone-700 px-2.5 py-1 rounded-lg font-black">{getCountdownToThursday(now)}</span>
                      </div>
                    </div>
                  </div>

                  {/* 임박 알림 센터 */}
                  <div className="lg:col-span-7 bg-white p-6 rounded-3xl border shadow-sm flex flex-col justify-between">
                    <div>
                      <span className="text-[10px] font-bold text-stone-400 block tracking-widest uppercase">⌛ URGENT MONITOR</span>
                      <p className="text-xs text-amber-800 mt-1">남은시간 5분 미만 또는 수령 대기중인 타이머 목록</p>
                    </div>
                    <div className="flex-1 mt-4">
                      {timers.filter(t => t.remainingSeconds <= 300).length === 0 ? (
                        <div className="text-center py-7 bg-[#FAF9F6] rounded-2xl border border-dashed border-stone-200 flex flex-col items-center justify-center">
                          <span className="text-lg">📭</span>
                          <p className="text-xs text-stone-400 font-bold mt-1.5">임박하거나 수집 대기 상태인 알림이 없습니다.</p>
                        </div>
                      ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[140px] overflow-y-auto">
                          {timers.filter(t => t.remainingSeconds <= 300).map(t => (
                            <div key={t.id} className="p-3 bg-[#FAF9F6] border border-stone-100 rounded-2xl flex justify-between items-center">
                              <div>
                                <p className="text-xs font-bold text-stone-800">{t.name}</p>
                                <span className="text-[9px] text-stone-400">기준: {formatSeconds(t.totalSeconds)}</span>
                              </div>
                              <span className="font-mono text-xs font-black text-rose-600">{formatSeconds(t.remainingSeconds)}</span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                </div>

                {/* 퀵 타이머 컨트롤러 패널 */}
                <div className="bg-gradient-to-tr from-[#F2ECE4] to-white p-6 rounded-3xl border shadow-sm">
                  <div className="flex flex-col lg:flex-row justify-between gap-6 items-center">
                    <div className="space-y-2 flex-1 w-full">
                      <h3 className="font-black text-stone-900 text-lg">🎯 개인용 퀵 타이머 직접 입력 세팅</h3>
                      <div className="flex flex-wrap gap-2 mt-4">
                        <input type="text" value={quickTimerInputName} onChange={e => setQuickTimerInputName(e.target.value)} className="border rounded-xl px-3 py-2 text-xs font-bold focus:outline-none bg-white" />
                        <button onClick={handleSaveQuickTimerName} className="bg-stone-900 text-white text-xs px-3 py-2 rounded-xl font-bold">이름수정</button>
                      </div>
                      <div className="flex items-center gap-1 mt-2 text-xs font-bold">
                        <input type="number" value={quickTimerDays} onChange={e => setQuickTimerDays(e.target.value)} className="w-12 text-center bg-white border rounded-lg py-1.5 focus:outline-none" /><span>일</span>
                        <input type="number" value={quickTimerHours} onChange={e => setQuickTimerHours(e.target.value)} className="w-12 text-center bg-white border rounded-lg py-1.5 focus:outline-none" /><span>시</span>
                        <input type="number" value={quickTimerMinutes} onChange={e => setQuickTimerMinutes(e.target.value)} className="w-12 text-center bg-white border rounded-lg py-1.5 focus:outline-none" /><span>분</span>
                        <input type="number" value={quickTimerSeconds} onChange={e => setQuickTimerSeconds(e.target.value)} className="w-12 text-center bg-white border rounded-lg py-1.5 focus:outline-none" /><span>초</span>
                        <button onClick={handleApplyDirectQuickTimer} className="bg-amber-700 text-white px-3 py-1.5 rounded-xl font-bold ml-2">적용</button>
                      </div>
                    </div>

                    <div className="bg-white p-5 rounded-2xl border shadow-sm min-w-[280px]">
                      <div className="flex justify-between items-center mb-3">
                        <div>
                          <p className="text-[10px] font-bold text-stone-400">{quickTimer.name}</p>
                          <p className="font-mono text-2xl font-black text-stone-900">{formatSeconds(quickTimer.remainingSeconds)}</p>
                        </div>
                        <div className="flex gap-1">
                          <button onClick={() => dispatchStateUpdate({ quickTimer: { ...quickTimer, isRunning: !quickTimer.isRunning } })} className="p-2.5 border rounded-xl bg-stone-50 text-emerald-800">
                            {quickTimer.isRunning ? <PauseIcon /> : <PlayIcon />}
                          </button>
                          <button onClick={() => dispatchStateUpdate({ quickTimer: { ...quickTimer, remainingSeconds: quickTimer.totalSeconds, isRunning: false } })} className="p-2.5 border rounded-xl bg-stone-50"><RefreshIcon /></button>
                        </div>
                      </div>
                      <div className="flex gap-1 pt-3 border-t text-[10px] font-bold overflow-x-auto">
                        {[['+1분', 60], ['+5분', 300], ['+1시간', 3600]].map(([l, v]) => (
                          <button key={l} onClick={() => adjustQuickTimerBySeconds(v)} className="bg-[#FAF9F6] border rounded-lg px-2.5 py-1 text-stone-600">{l}</button>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* 2. 숙제 패널 */}
            {activeTab === 'homework' && (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div className="bg-white p-6 rounded-3xl border shadow-sm flex flex-col">
                  <h3 className="font-bold text-stone-900 border-b pb-3 flex justify-between">🌅 일일 숙제 <span className="font-mono text-xs text-rose-600">{getCountdownToMidnight(now)}</span></h3>
                  <div className="flex gap-1 py-2 border-b"><button onClick={() => handleBulkCheck('daily', true)} className="flex-1 text-[10px] font-bold bg-stone-50 py-1 rounded">전체완료</button><button onClick={() => handleBulkCheck('daily', false)} className="flex-1 text-[10px] font-bold bg-stone-50 py-1 rounded">전체해제</button></div>
                  <form onSubmit={e => handleAddTask('daily', e)} className="flex gap-2 py-3"><input type="text" placeholder="+ 새 숙제 등록" value={newDailyName} onChange={e => setNewDailyName(e.target.value)} className="flex-1 border text-xs px-3 py-2 rounded-xl focus:outline-none" /><button type="submit" className="bg-stone-900 text-white rounded-xl px-3">+</button></form>
                  <div className="space-y-2 max-h-[380px] overflow-y-auto">
                    {getSortedHomework(dailyHomework).map(item => (
                      <div key={item.id} className="p-3 border rounded-xl flex justify-between items-center text-xs">
                        <label className="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={item.done} onChange={() => dispatchStateUpdate({ dailyHomework: dailyHomework.map(h => h.id === item.id ? { ...h, done: !h.done } : h) })} /><span className={item.done ? 'line-through text-stone-400' : 'font-bold text-stone-800'}>{item.name}</span></label>
                        <button onClick={() => handleDeleteTask('daily', item.id)} className="text-stone-300 hover:text-rose-600"><TrashIcon className="w-3.5 h-3.5" /></button>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="bg-white p-6 rounded-3xl border shadow-sm flex flex-col">
                  <h3 className="font-bold text-stone-900 border-b pb-3 flex justify-between">⚔️ 12시간 숙제 <span className="font-mono text-xs text-rose-600">{getCountdownToTwelveHour(now)}</span></h3>
                  <div className="flex gap-1 py-2 border-b"><button onClick={() => handleBulkCheck('12h', true)} className="flex-1 text-[10px] font-bold bg-stone-50 py-1 rounded">전체완료</button><button onClick={() => handleBulkCheck('12h', false)} className="flex-1 text-[10px] font-bold bg-stone-50 py-1 rounded">전체해제</button></div>
                  <form onSubmit={e => handleAddTask('12h', e)} className="flex gap-2 py-3"><input type="text" placeholder="+ 새 숙제 등록" value={newTwelveName} onChange={e => setNewTwelveName(e.target.value)} className="flex-1 border text-xs px-3 py-2 rounded-xl focus:outline-none" /><button type="submit" className="bg-stone-900 text-white rounded-xl px-3">+</button></form>
                  <div className="space-y-2 max-h-[380px] overflow-y-auto">
                    {getSortedHomework(twelveHourHomework).map(item => (
                      <div key={item.id} className="p-3 border rounded-xl flex justify-between items-center text-xs">
                        <label className="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={item.done} onChange={() => dispatchStateUpdate({ twelveHourHomework: twelveHourHomework.map(h => h.id === item.id ? { ...h, done: !h.done } : h) })} /><span className={item.done ? 'line-through text-stone-400' : 'font-bold text-stone-800'}>{item.name}</span></label>
                        <button onClick={() => handleDeleteTask('12h', item.id)} className="text-stone-300 hover:text-rose-600"><TrashIcon className="w-3.5 h-3.5" /></button>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="bg-white p-6 rounded-3xl border shadow-sm flex flex-col">
                  <h3 className="font-bold text-stone-900 border-b pb-3 flex justify-between">🛡️ 주간 숙제 <span className="font-mono text-xs text-stone-600">{getCountdownToThursday(now)}</span></h3>
                  <div className="flex gap-1 py-2 border-b"><button onClick={() => handleBulkCheck('weekly', true)} className="flex-1 text-[10px] font-bold bg-stone-50 py-1 rounded">전체완료</button><button onClick={() => handleBulkCheck('weekly', false)} className="flex-1 text-[10px] font-bold bg-stone-50 py-1 rounded">전체해제</button></div>
                  <form onSubmit={e => handleAddTask('weekly', e)} className="flex gap-2 py-3"><input type="text" placeholder="+ 새 숙제 등록" value={newWeeklyName} onChange={e => setNewWeeklyName(e.target.value)} className="flex-1 border text-xs px-3 py-2 rounded-xl focus:outline-none" /><button type="submit" className="bg-stone-900 text-white rounded-xl px-3">+</button></form>
                  <div className="space-y-2 max-h-[380px] overflow-y-auto">
                    {getSortedHomework(weeklyHomework).map(item => (
                      <div key={item.id} className="p-3 border rounded-xl flex justify-between items-center text-xs">
                        <label className="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={item.done} onChange={() => dispatchStateUpdate({ weeklyHomework: weeklyHomework.map(h => h.id === item.id ? { ...h, done: !h.done } : h) })} /><span className={item.done ? 'line-through text-stone-400' : 'font-bold text-stone-800'}>{item.name}</span></label>
                        <button onClick={() => handleDeleteTask('weekly', item.id)} className="text-stone-300 hover:text-rose-600"><TrashIcon className="w-3.5 h-3.5" /></button>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* 3. 💡 재화 패널 수정 화면 세부 수동 설정 UI 완벽 복구 */}
            {activeTab === 'currency' && (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {computedCurrencies.map(c => (
                  <div key={c.id} className={`bg-white rounded-3xl border p-6 shadow-sm flex flex-col justify-between ${!c.isActive && 'opacity-40 bg-stone-50'}`}>
                    <div className="flex justify-between items-center mb-4">
                      <span className="font-black text-stone-800 text-sm">{c.name}</span>
                      <button onClick={() => handleToggleCurrencyActive(c.id)} className={`text-[10px] font-bold px-2.5 py-1 rounded-lg border transition-colors ${c.isActive ? 'bg-rose-50 text-rose-600 border-rose-200' : 'bg-stone-900 text-white'}`}>{c.isActive ? '비활성화' : '활성화시키기'}</button>
                    </div>
                    {c.isActive && (
                      <div className="space-y-4">
                        <div className="bg-stone-50 p-4 rounded-xl border font-mono flex justify-between text-base">
                          <div className="flex flex-col"><span className="text-[9px] font-bold text-stone-400 block mb-1">현재 보유량</span><input type="number" value={c.current} onChange={e => handleUpdateCurrencyCurrent(c.id, e.target.value)} className="w-16 bg-transparent font-bold focus:outline-none" /></div>
                          <span className="text-stone-400 self-end mb-1">/</span>
                          <div className="flex flex-col items-end"><span className="text-[9px] font-bold text-stone-400 block mb-1">최대 상한치</span><input type="number" value={c.max} onChange={e => handleUpdateCurrencyMax(c.id, e.target.value)} className="w-16 bg-transparent text-right font-bold focus:outline-none" /></div>
                        </div>
                        <div className="flex justify-between items-center text-xs font-bold text-stone-600 bg-stone-50/50 p-2.5 rounded-xl border border-dashed">
                          <span>개당 충전 시간 (분):</span>
                          <input type="number" value={c.rechargeTimeMinutes} onChange={e => handleUpdateCurrencyMinutes(c.id, e.target.value)} className="w-12 text-center bg-white border rounded-lg py-1 focus:outline-none" />
                        </div>
                        <div className="pt-3 border-t text-xs space-y-1.5 font-bold text-stone-600">
                          <div className="flex justify-between"><span>실시간 동기화 수량:</span><span className="text-stone-900 font-black">{c.liveCurrent}</span></div>
                          <div className="flex justify-between"><span>다음 충전까지:</span><span className="text-stone-800">{c.secondsToNext}초</span></div>
                          <div className="flex justify-between"><span>완전 충전까지:</span><span className="text-rose-600 font-extrabold">{formatSeconds(c.secondsToFull)}</span></div>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}

            {/* 4. 가속 센터 (💡 직접 단축 시간 프롬프트 창 완벽 복구) */}
            {activeTab === 'timer' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="bg-white p-6 rounded-3xl border shadow-sm h-fit space-y-4">
                  <h3 className="font-bold text-stone-900">➕ 새 가속 타이머 등록</h3>
                  <form onSubmit={handleAddCustomTimer} className="space-y-3">
                    <input type="text" placeholder="초시계 이름" value={customTimerName} onChange={e => setCustomTimerName(e.target.value)} className="w-full border text-xs p-3 rounded-xl focus:outline-none" />
                    <div className="grid grid-cols-3 gap-1.5 text-xs font-bold">
                      <div className="flex flex-col items-center gap-1"><input type="number" placeholder="0" value={customTimerDays} onChange={e => setCustomTimerDays(e.target.value)} className="w-full border p-2 rounded-lg text-center focus:outline-none bg-stone-50" /><span className="text-[10px] text-stone-400">일</span></div>
                      <div className="flex flex-col items-center gap-1"><input type="number" placeholder="0" value={customTimerHours} onChange={e => setCustomTimerHours(e.target.value)} className="w-full border p-2 rounded-lg text-center focus:outline-none bg-stone-50" /><span className="text-[10px] text-stone-400">시간</span></div>
                      <div className="flex flex-col items-center gap-1"><input type="number" placeholder="0" value={customTimerMinutes} onChange={e => setCustomTimerMinutes(e.target.value)} className="w-full border p-2 rounded-lg text-center focus:outline-none bg-stone-50" /><span className="text-[10px] text-stone-400">분</span></div>
                    </div>
                    <button type="submit" className="w-full bg-stone-900 text-white text-xs font-bold py-3 rounded-xl">타이머 등록</button>
                  </form>
                </div>

                <div className="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4">
                  {timers.map(t => (
                    <div key={t.id} className="bg-white rounded-3xl border p-4 shadow-sm flex flex-col justify-between">
                      <div className="flex justify-between items-center">
                        <span className="font-bold text-xs text-stone-800">{t.name}</span>
                        <div className="flex gap-1">
                          <button onClick={() => t.isRunning ? pauseTimer(t.id) : startTimer(t.id)} className="p-1 border rounded bg-stone-50 text-stone-600">
                            {t.isRunning ? <PauseIcon /> : <PlayIcon />}
                          </button>
                          <button onClick={() => resetTimer(t.id)} className="p-1 border rounded bg-stone-50 text-stone-400"><RefreshIcon /></button>
                        </div>
                      </div>
                      <div className="my-3">
                        <p className="font-mono text-base font-black text-stone-900">{formatSeconds(t.remainingSeconds)} <span className="text-xs text-stone-400 font-normal">/ {formatSeconds(t.totalSeconds)}</span></p>
                      </div>
                      <div className="flex gap-1 mt-2 pt-2 border-t text-[9px] font-bold overflow-x-auto">
                        <button type="button" onClick={() => accelerateTimer(t.id, 10)} className="bg-stone-50 border rounded-md px-2 py-1">-10분</button>
                        <button type="button" onClick={() => accelerateTimer(t.id, 30)} className="bg-stone-50 border rounded-md px-2 py-1">-30분</button>
                        <button type="button" onClick={() => accelerateTimer(t.id, 60)} className="bg-stone-50 border rounded-md px-2 py-1">-1시간</button>
                        
                        {/* 💡 직접 분 단위를 숫자로 써서 빠르게 스킵하는 [직접 입력] 단축 팝업창 완벽 복구 */}
                        <button type="button" onClick={() => {
                          setPromptConfig({
                            isOpen: true,
                            title: `⏱️ [${t.name}] 직접 시간 단축 처리`,
                            placeholder: "건너뛸 시간 입력 (분 단위 숫자)",
                            value: "10",
                            onConfirm: (val) => accelerateTimer(t.id, parseInt(val) || 0)
                          });
                        }} className="bg-stone-900 text-white rounded-md px-2 py-1">직접 입력</button>
                        
                        {!t.preset && <button type="button" onClick={() => handleDeleteTimer(t.id)} className="bg-rose-50 text-rose-600 border border-rose-200 rounded-md px-2 py-1 ml-auto">삭제</button>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </main>

          {/* 💡 직접 시간 입력 단축 시 띄워지는 프롬프트 입력창 모달 컴포넌트 복구 */}
          {promptConfig.isOpen && (
            <div className="fixed inset-0 z-[200] bg-stone-900/40 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4">
                <h4 className="font-bold text-stone-800 text-base">{promptConfig.title}</h4>
                <input type="number" placeholder={promptConfig.placeholder} value={promptConfig.value} onChange={e => setPromptConfig({ ...promptConfig, value: e.target.value })} className="w-full border p-3 rounded-xl focus:outline-none font-bold" />
                <div className="flex gap-2 justify-end">
                  <button onClick={() => setPromptConfig({ ...promptConfig, isOpen: false })} className="px-4 py-2 border rounded-xl text-xs font-bold hover:bg-stone-50">취소</button>
                  <button onClick={() => { promptConfig.onConfirm(promptConfig.value); setPromptConfig({ ...promptConfig, isOpen: false }); }} className="px-4 py-2 bg-stone-900 text-white rounded-xl text-xs font-bold">시간 삭감 적용</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function copyToClipboard(text) {
      const textField = document.createElement('textarea');
      textField.innerText = text;
      document.body.appendChild(textField);
      textField.select();
      document.execCommand('copy');
      textField.remove();
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
