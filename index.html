    const getSortedHomework = (list) => {
      if (!list) return [];
      return [...list].sort((a, b) => {
        if (a.important && !b.important) return -1;
        if (!a.important && b.important) return 1;
        if (!a.done && b.done) return -1;
        if (a.done && !b.done) return 1;
        return 0;
      });
    };

    const getSortedTimers = (list) => {
      if (!list) return [];
      return [...list].sort((a, b) => {
        const aDoneOrStopped = a.remainingSeconds <= 0 || !a.isRunning;
        const bDoneOrStopped = b.remainingSeconds <= 0 || !b.isRunning;
        if (aDoneOrStopped && !bDoneOrStopped) return -1;
        if (!aDoneOrStopped && bDoneOrStopped) return 1;
        return 0;
      });
    };

    const formatSeconds = (totalSec) => {
      if (totalSec <= 0) return '완료!';
      const days = Math.floor(totalSec / 86400);
      const hrs = Math.floor((totalSec % 86400) / 3600);
      const mins = Math.floor((totalSec % 3600) / 60);
      const secs = totalSec % 60;
      return `${days > 0 ? days + '일 ' : ''}${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    };
    const formatElapsedSeconds = (totalSec) => {
      const hrs = Math.floor(totalSec / 3600);
      const mins = Math.floor((totalSec % 3600) / 60);
      const secs = totalSec % 60;
      return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    };
    const getCountdownToMidnight = (now) => {
      const midnight = new Date(now); midnight.setHours(24, 0, 0, 0);
      const diff = midnight.getTime() - now.getTime();
      if (diff <= 0) return "00:00:00";
      const hrs = Math.floor(diff / 3600000); const mins = Math.floor((diff % 3600000) / 60000); const secs = Math.floor((diff % 60000) / 1000);
      return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    };

    const getCountdownToTwelveHour = (now) => {
      const hours = now.getHours(); const nextReset = new Date(now);
      if (hours < 12) nextReset.setHours(12, 0, 0, 0); else nextReset.setHours(24, 0, 0, 0);
      const diff = nextReset.getTime() - now.getTime();
      if (diff <= 0) return "00:00:00";
      const hrs = Math.floor(diff / 3600000); const mins = Math.floor((diff % 3600000) / 60000); const secs = Math.floor((diff % 60000) / 1000);
      return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    };
    const getCountdownToThursday = (now) => {
      const today = now.getDay(); const daysUntilThursday = (4 - today + 7) % 7 || 7;
      const target = new Date(now); target.setDate(now.getDate() + daysUntilThursday); target.setHours(0, 0, 0, 0);
      const diff = target.getTime() - now.getTime();
      if (diff <= 0) return "리셋 완료";
      const days = Math.floor(diff / 86400000); const hrs = Math.floor((diff % 86400000) / 3600000); const mins = Math.floor((diff % 3600000) / 60000);
      return `${days}일 ${hrs}시간 ${mins}분`;
    };
    const getPostOfficeStatus = (now) => {
      const hour = now.getHours(); const min = now.getMinutes(); const sec = now.getSeconds();
      const currentPeriodHour = Math.floor(hour / 2) * 2; const isCurrentlyOpen = min < 20;
      if (isCurrentlyOpen) {
        return { isOpen: true, text: '광장 우체국 보상 수령 가능!', subText: `${19 - min}분 ${59 - sec}초 내 수령 필요`, currentWindow: `${currentPeriodHour}시 ~ ${currentPeriodHour}시 20분` };
      } else {
        const nextOpenHour = (currentPeriodHour + 2) % 24; let targetDate = new Date(now); targetDate.setHours(nextOpenHour, 0, 0, 0);
        if (nextOpenHour <= hour) targetDate.setDate(targetDate.setDate() + 1);
        const diffMs = targetDate.getTime() - now.getTime();
        const diffHr = Math.floor(diffMs / 3600000); const diffMin = Math.floor((diffMs % 3600000) / 60000); const diffSec = Math.floor((diffMs % 60000) / 1000);
        return { isOpen: false, text: '우체국 수령 대기 중', subText: `다음 개방: ${diffHr > 0 ? diffHr + '시간 ' : ''}${diffMin}분 ${diffSec}초 남음`, currentWindow: `${nextOpenHour}시 ~ ${nextOpenHour}시 20분` };
      }
    };

    const windowcopyToClipboard = (text) => {
      const textField = document.createElement('textarea'); textField.innerText = text; document.body.appendChild(textField); textField.select(); document.execCommand('copy'); textField.remove();
    };

    const INITIAL_DAILY = [
      { id: 1, name: '친구 선물 보내기', done: false, important: true, memo: '' },
      { id: 2, name: '무료 선물 받기', done: false, important: false, memo: '' },
      { id: 3, name: '무료 뽑기 재화', done: false, important: false, memo: '' },
      { id: 4, name: '현상수배 소탕/진행', done: false, important: true, memo: '' },
      { id: 5, name: '소원나무 3단계 수령', done: false, important: true, memo: '골드 2배 버프 타임 노리기!' },
      { id: 6, name: '해상무역센터 무역선 선적', done: false, important: false, memo: '' },
      { id: 7, name: '꿈꾸는 별무리섬 탐험', done: false, important: false, memo: '' },
      { id: 8, name: '광장 일일 퀘스트', done: false, important: false, memo: '' },
      { id: 9, name: '광장 잠수 버프 채우기', done: false, important: false, memo: '' },

    ];
    const INITIAL_TWELVE = [{ id: 101, name: '몬스터 대난투 참여', done: false, important: true, memo: '하루 2번 충전 체크' }];
    const INITIAL_WEEKLY = [
      { id: 201, name: '길드 토벌전 참여', done: false, important: true, memo: '' },
      { id: 202, name: '킹덤 아레나 리그 참여', done: false, important: true, memo: '' },
      { id: 203, name: '증명의 전장 완료', done: false, important: false, memo: '' }

    const INITIAL_CURRENCIES = [
      { id: 'stamina_normal', name: '일반 스태미너', current: 50, max: 100, rechargeTimeMinutes: 5, isActive: true, remainingSeconds: 300 },
      { id: 'stamina_thick', name: '두툼한 스태미너', current: 20, max: 50, rechargeTimeMinutes: 10, isActive: true, remainingSeconds: 600 },
      { id: 'stamina_destiny', name: '운명의 스태미너', current: 10, max: 30, rechargeTimeMinutes: 18, isActive: true, remainingSeconds: 1080 },
      { id: 'arena', name: '아레나 티켓', current: 4, max: 8, rechargeTimeMinutes: 60, isActive: true, remainingSeconds: 3600 },
      { id: 'arcade_arena', name: '아케이드 아레나', current: 5, max: 10, rechargeTimeMinutes: 120, isActive: true, remainingSeconds: 7200 },
      { id: 'alliance', name: '수호의 성전', current: 2, max: 6, rechargeTimeMinutes: 720, isActive: true, remainingSeconds: 43200 }
    ];
    const DEFAULT_TIMERS = [
      { id: 'dock', name: '선착장 보상', totalSeconds: 8 * 3600, remainingSeconds: 8 * 3600, isRunning: false, preset: true },
      { id: 'train_1', name: '곰젤리 열차 1번', totalSeconds: 4 * 3600, remainingSeconds: 4 * 3600, isRunning: false, preset: true },
      { id: 'train_2', name: '곰젤리 열차 2번', totalSeconds: 6 * 3600, remainingSeconds: 6 * 3600, isRunning: false, preset: true },
      { id: 'train_3', name: '곰젤리 열차 3번', totalSeconds: 6 * 3600, remainingSeconds: 6 * 3600, isRunning: false, preset: true },
      { id: 'balloon', name: '곰젤리 열기구', totalSeconds: 5 * 3600 + 46 * 60, remainingSeconds: 5 * 3600 + 46 * 60, isRunning: false, preset: true },
      { id: 'beach', name: '앵무의 해변교역소', totalSeconds: 6 * 3600, remainingSeconds: 6 * 3600, isRunning: false, preset: true },
      { id: 'mine_explore', name: '광산 탐험', totalSeconds: 8 * 3600, remainingSeconds: 8 * 3600, isRunning: false, preset: true },
      { id: 'mine_harvest_1', name: '광산 채굴 1번', totalSeconds: 24 * 3600, remainingSeconds: 24 * 3600, isRunning: false, preset: true },
      { id: 'mine_harvest_2', name: '광산 채굴 2번', totalSeconds: 24 * 3600, remainingSeconds: 24 * 3600, isRunning: false, preset: true },
      { id: 'mine_harvest_3', name: '광산 채굴 3번', totalSeconds: 24 * 3600, remainingSeconds: 24 * 3600, isRunning: false, preset: true },
      { id: 'mine_harvest_4', name: '광산 채굴 4번', totalSeconds: 24 * 3600, remainingSeconds: 24 * 3600, isRunning: false, preset: true },
      { id: 'mine_harvest_5', name: '광산 채굴 5번', totalSeconds: 24 * 3600, remainingSeconds: 24 * 3600, isRunning: false, preset: true },
      { id: 'mine_harvest_6', name: '광산 채굴 6번', totalSeconds: 24 * 3600, remainingSeconds: 24 * 3600, isRunning: false, preset: true }
    ];

    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [now, setNow] = useState(new Date());
      const [user, setUser] = useState(null);
      const [syncCode, setSyncCode] = useState(() => localStorage.getItem('crk_sync_code_v4') || generateSyncCode());
      const [cloudStatus, setCloudStatus] = useState('authenticating');
      const [toastMessage, setToastMessage] = useState('');
      
      const [inlineEditConfig, setInlineEditConfig] = useState({ isOpen: false, id: null, name: '', mode: 'delay', days: '0', hours: '0', minutes: '0' });
      const [selectedMineIds, setSelectedMineIds] = useState([]);

      const getOfflineSeconds = () => {
        const lastActive = localStorage.getItem('crk_last_active');
        if (!lastActive) return 0;
        return Math.floor((Date.now() - parseInt(lastActive)) / 1000);
      };
      const offlineSec = getOfflineSeconds();
      const [dailyHomework, setDailyHomework] = useState(() => JSON.parse(localStorage.getItem('crk_local_daily_hw')) || INITIAL_DAILY);
      const [twelveHourHomework, setTwelveHourHomework] = useState(() => JSON.parse(localStorage.getItem('crk_local_12h_hw')) || INITIAL_TWELVE);
      const [weeklyHomework, setWeeklyHomework] = useState(() => JSON.parse(localStorage.getItem('crk_local_weekly_hw')) || INITIAL_WEEKLY);
      
      const [currencies, setCurrencies] = useState(() => {
        const local = JSON.parse(localStorage.getItem('crk_local_currencies')) || INITIAL_CURRENCIES;
        if (offlineSec > 0) {
          return local.map(c => {
            if (!c.isActive || c.current >= c.max) return c;
            let rem = (c.remainingSeconds !== undefined ? c.remainingSeconds : c.rechargeTimeMinutes * 60) - offlineSec;
            let cur = c.current; const step = c.rechargeTimeMinutes * 60;
            while (rem <= 0 && cur < c.max) { cur += 1; rem += step; }
            if (cur >= c.max) rem = step;
            return { ...c, current: cur, remainingSeconds: rem };
          });
        }
        return local;
      });
      const [timers, setTimers] = useState(() => {
        const local = JSON.parse(localStorage.getItem('crk_local_timers')) || DEFAULT_TIMERS;
        if (offlineSec > 0) {
          return local.map(t => t.isRunning && t.remainingSeconds > 0 ? { ...t, remainingSeconds: Math.max(0, t.remainingSeconds - offlineSec) } : t);
        }
        return local;
      });
      const [postOfficeClaims, setPostOfficeClaims] = useState(() => JSON.parse(localStorage.getItem('crk_local_claims')) || { date: new Date().toDateString(), claims: [false, false, false] });
      const [fountainTime, setFountainTime] = useState(() => {
        const local = JSON.parse(localStorage.getItem('crk_local_fountain')) || { elapsedSeconds: 0, isRunning: false };
        if (offlineSec > 0 && local.isRunning) { return { ...local, elapsedSeconds: Math.min(28800, local.elapsedSeconds + offlineSec) }; }
        return local;
      });
      const [quickTimer, setQuickTimer] = useState(() => {
        const local = JSON.parse(localStorage.getItem('crk_local_quick_timer')) || { name: '개인용 퀵 타이머 🎯', totalSeconds: 300, remainingSeconds: 300, isRunning: false };
        if (offlineSec > 0 && local.isRunning) {
          const rem = Math.max(0, local.remainingSeconds - offlineSec);
          return { ...local, remainingSeconds: rem, isRunning: rem > 0 };
        }
        return local;
      });

      const [quickTimerInputName, setQuickTimerInputName] = useState('개인용 퀵 타이머 🎯');
      const [quickTimerDays, setQuickTimerDays] = useState('0');
      const [quickTimerHours, setQuickTimerHours] = useState('0');
      const [quickTimerMinutes, setQuickTimerMinutes] = useState('5');
      const [quickTimerSeconds, setQuickTimerSeconds] = useState('0');

      const [newDailyName, setNewDailyName] = useState('');
      const [newTwelveName, setNewTwelveName] = useState('');
      const [newWeeklyName, setNewWeeklyName] = useState('');
      
      const [customTimerName, setCustomTimerName] = useState('');
      const [customTimerDays, setCustomTimerDays] = useState('0');
      const [customTimerHours, setCustomTimerHours] = useState('0');
      const [customTimerMinutes, setCustomTimerMinutes] = useState('0');
      
      const stateRef = useRef();
      stateRef.current = { dailyHomework, twelveHourHomework, weeklyHomework, currencies, timers, postOfficeClaims, fountainTime, quickTimer, syncCode, user, cloudStatus };
      
      const showToast = (message) => {
        setToastMessage(message);
        setTimeout(() => setToastMessage(''), 3000);
      };

      const triggerNotification = (title, body) => {
        if (window.pywebview && window.pywebview.api && window.pywebview.api.notify) {
          window.pywebview.api.notify(title, body);
        } else if ("Notification" in window) {
          if (Notification.permission === "granted") new Notification(title, { body });
        }
        showToast(`🔔 ${title} : ${body}`);
      };

      // 💾 [파이썬 전용 로컬 저장 파일 연동 브릿지 가동]
      useEffect(() => {
        if (window.pywebview && window.pywebview.api && window.pywebview.api.load_local_data) {
          window.pywebview.api.load_local_data().then(strData => {
            if (strData) {
              const cloudData = JSON.parse(strData);
              if (cloudData.dailyHomework) setDailyHomework(cloudData.dailyHomework);
              if (cloudData.twelveHourHomework) setTwelveHourHomework(cloudData.twelveHourHomework);
              if (cloudData.weeklyHomework) setWeeklyHomework(cloudData.weeklyHomework);
              if (cloudData.currencies) setCurrencies(cloudData.currencies);
              if (cloudData.timers) setTimers(cloudData.timers);
              if (cloudData.postOfficeClaims) setPostOfficeClaims(cloudData.postOfficeClaims);
              if (cloudData.fountainTime) setFountainTime(cloudData.fountainTime);
              if (cloudData.quickTimer) setQuickTimer(cloudData.quickTimer);
              if (cloudData.syncCode) setSyncCode(cloudData.syncCode);
              showToast("💾 파이썬 안전 저장 파일 연동 완료!");
            }
          });
        }
      }, []);

      useEffect(() => {
        signInAnonymously(auth).catch(() => setCloudStatus('local_error'));
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          if (currentUser) { setUser(currentUser); setCloudStatus('connected'); } 
          else { setUser(null); setCloudStatus('disconnected'); }
        });
        return () => unsubscribe();
      }, []);

      // 📡 [파이어베이스 도메인 검증 우회 실시간 감지기]
      useEffect(() => {
        if (!syncCode) return; // 💡 도메인 제한 오류 우회를 위해 로그인 검증 조건을 해제
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'kingdoms', syncCode);
        const unsubscribeSnapshot = onSnapshot(docRef, { includeMetadataChanges: true }, (docSnap) => {
          if (docSnap.metadata.hasPendingWrites) return;
          if (docSnap.exists()) {
            const cloudData = docSnap.data();
            if (cloudData.dailyHomework) { setDailyHomework(cloudData.dailyHomework); localStorage.setItem('crk_local_daily_hw', JSON.stringify(cloudData.dailyHomework)); }
            if (cloudData.twelveHourHomework) { setTwelveHourHomework(cloudData.twelveHourHomework); localStorage.setItem('crk_local_12h_hw', JSON.stringify(cloudData.twelveHourHomework)); }
            if (cloudData.weeklyHomework) { setWeeklyHomework(cloudData.weeklyHomework); localStorage.setItem('crk_local_weekly_hw', JSON.stringify(cloudData.weeklyHomework)); }
            if (cloudData.postOfficeClaims) { setPostOfficeClaims(cloudData.postOfficeClaims); localStorage.setItem('crk_local_claims', JSON.stringify(cloudData.postOfficeClaims)); }
            
            if (cloudData.lastUpdatedTime) {
              const cloudOfflineSec = Math.floor((Date.now() - cloudData.lastUpdatedTime) / 1000);
              if (cloudOfflineSec > 5) {
                if (cloudData.currencies) {
                  const adjusted = cloudData.currencies.map(c => {
                    if (!c.isActive || c.current >= c.max) return c;
                    let rem = (c.remainingSeconds !== undefined ? c.remainingSeconds : c.rechargeTimeMinutes * 60) - cloudOfflineSec;
                    let cur = c.current; const step = c.rechargeTimeMinutes * 60;
                    while (rem <= 0 && cur < c.max) { cur += 1; rem += step; }
                    if (cur >= c.max) rem = step;
                    return { ...c, current: cur, remainingSeconds: rem };
                  });
                  setCurrencies(adjusted); localStorage.setItem('crk_local_currencies', JSON.stringify(adjusted));
                }
                if (cloudData.timers) {
                  const adjusted = cloudData.timers.map(t => t.isRunning && t.remainingSeconds > 0 ? { ...t, remainingSeconds: Math.max(0, t.remainingSeconds - cloudOfflineSec) } : t);
                  setTimers(adjusted); localStorage.setItem('crk_local_timers', JSON.stringify(adjusted));
                }
              } else {
                if (cloudData.currencies) { setCurrencies(cloudData.currencies); localStorage.setItem('crk_local_currencies', JSON.stringify(cloudData.currencies)); }
                if (cloudData.timers) { setTimers(cloudData.timers); localStorage.setItem('crk_local_timers', JSON.stringify(cloudData.timers)); }
              }
            }
          }
        });
        return () => unsubscribeSnapshot();
      }, [syncCode]);

      useEffect(() => {
        localStorage.setItem('crk_last_active', Date.now().toString());
        const interval = setInterval(() => {
          const currentTime = new Date(); setNow(currentTime);
          const lastActive = parseInt(localStorage.getItem('crk_last_active') || Date.now());
          const deltaSeconds = Math.floor((Date.now() - lastActive) / 1000);
          if (deltaSeconds <= 0) return;
          localStorage.setItem('crk_last_active', Date.now().toString());

          setCurrencies(prev => {
            const next = prev.map(c => {
              if (!c.isActive || c.current >= c.max) return c;
              let rem = (c.remainingSeconds !== undefined ? c.remainingSeconds : c.rechargeTimeMinutes * 60) - deltaSeconds;
              let cur = c.current; const step = c.rechargeTimeMinutes * 60;
              while (rem <= 0 && cur < c.max) { cur += 1; rem += step; }
              if (cur >= c.max) rem = step;
              return { ...c, current: cur, remainingSeconds: rem };
            });
            localStorage.setItem('crk_local_currencies', JSON.stringify(next));
            saveToCloudEngineLevel({ currencies: next });
            return next;
          });

          setFountainTime(prev => {
            if (prev.isRunning && prev.elapsedSeconds < 28800) {
              const updated = Math.min(28800, prev.elapsedSeconds + deltaSeconds);
              const next = { ...prev, elapsedSeconds: updated };
              if (updated === 28800 && prev.elapsedSeconds < 28800) triggerNotification("⛲ 풍요의 분수 최대 누적!", "보상을 수령하세요!");
              localStorage.setItem('crk_local_fountain', JSON.stringify(next));
              saveToCloudEngineLevel({ fountainTime: next });
              return next;
            }
            return prev;
          });

          setTimers(prev => {
            let changed = false;
            const next = prev.map(t => {
              if (t.isRunning && t.remainingSeconds > 0) {
                changed = true; const updated = Math.max(0, t.remainingSeconds - deltaSeconds);
                if (updated === 0) triggerNotification("⏳ 타이머 완료!", `[${t.name}] 시간이 되었습니다!`);
                return { ...t, remainingSeconds: updated };
              }
              return t;
            });
            if (changed) {
              localStorage.setItem('crk_local_timers', JSON.stringify(next));
              saveToCloudEngineLevel({ timers: next });
            }
            return next;
          });
        }, 1000);
        return () => clearInterval(interval);
      }, []);

      const postOfficeStatus = getPostOfficeStatus(now);
      const dailyDoneCount = dailyHomework.filter(h => h.done).length;
      const twelveHourDoneCount = twelveHourHomework.filter(h => h.done).length;
      const weeklyDoneCount = weeklyHomework.filter(h => h.done).length;
      const totalCompletedTasks = dailyDoneCount + twelveHourDoneCount + weeklyDoneCount;
      const totalTasks = dailyHomework.length + twelveHourHomework.length + weeklyHomework.length;
      const totalProgressPercent = totalTasks > 0 ? Math.round((totalCompletedTasks / totalTasks) * 100) : 0;

      function handleToggleCurrencyActive(id) { dispatchStateUpdate({ currencies: currencies.map(c => c.id === id ? { ...c, isActive: !c.isActive } : c) }); }
      function handleUpdateCurrencyCurrent(id, value) { dispatchStateUpdate({ currencies: currencies.map(c => c.id === id ? { ...c, current: parseInt(value) || 0 } : c) }); }
      function handleUpdateCurrencyMax(id, value) { dispatchStateUpdate({ currencies: currencies.map(c => c.id === id ? { ...c, max: parseInt(value) || 0 } : c) }); }
      function handleUpdateCurrencyMinutes(id, value) { dispatchStateUpdate({ currencies: currencies.map(c => c.id === id ? { ...c, rechargeTimeMinutes: parseInt(value) || 0 } : c) }); }
      function handleUpdateCurrencyNextUnitSeconds(id, min, sec) { dispatchStateUpdate({ currencies: currencies.map(c => c.id === id ? { ...c, remainingSeconds: (parseInt(min) || 0) * 60 + (parseInt(sec) || 0) } : c) }); }

      const computedCurrencies = currencies.map(c => {
        const liveCurrent = c.current;
        const secondsToNext = c.current >= c.max ? 0 : c.remainingSeconds;
        const secondsToFull = c.current >= c.max ? 0 : c.remainingSeconds + ((c.max - c.current - 1) * c.rechargeTimeMinutes * 60);
        return { ...c, liveCurrent, secondsToNext, secondsToFull };
      });

      async function saveToCloudEngineLevel(newData) {
        const currentRef = stateRef.current;
        if (!currentRef.syncCode) return;
        try {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'kingdoms', currentRef.syncCode);
          await setDoc(docRef, {
            dailyHomework: newData.dailyHomework ?? currentRef.dailyHomework,
            twelveHourHomework: newData.twelveHourHomework ?? currentRef.twelveHourHomework,
            weeklyHomework: newData.weeklyHomework ?? currentRef.weeklyHomework,
            currencies: newData.currencies ?? currentRef.currencies,
            timers: newData.timers ?? currentRef.timers,
            postOfficeClaims: newData.postOfficeClaims ?? currentRef.postOfficeClaims,
            fountainTime: newData.fountainTime ?? currentRef.fountainTime,
            quickTimer: newData.quickTimer ?? currentRef.quickTimer,
            lastUpdatedTime: Date.now()
          }, { merge: true });
        } catch {}
      }

      async function saveToCloud(newData) {
        if (!syncCode) return;
        try {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'kingdoms', syncCode);
          await setDoc(docRef, {
            dailyHomework: newData.dailyHomework ?? dailyHomework,
            twelveHourHomework: newData.twelveHourHomework ?? twelveHourHomework,
            weeklyHomework: newData.weeklyHomework ?? weeklyHomework,
            currencies: newData.currencies ?? currencies,
            timers: newData.timers ?? timers,
            postOfficeClaims: newData.postOfficeClaims ?? postOfficeClaims,
            fountainTime: newData.fountainTime ?? fountainTime,
            quickTimer: newData.quickTimer ?? quickTimer,
            lastUpdatedTime: Date.now()
          }, { merge: true });
        } catch {}
      }

      function dispatchStateUpdate(updates) {
        const dHW = updates.dailyHomework ?? dailyHomework;
        const tHW = updates.twelveHourHomework ?? twelveHourHomework;
        const wHW = updates.weeklyHomework ?? weeklyHomework;
        const curr = updates.currencies ?? currencies;
        const tms = updates.timers ?? timers;
        const poc = updates.postOfficeClaims ?? postOfficeClaims;
        const ftt = updates.fountainTime ?? fountainTime;
        const qkt = updates.quickTimer ?? quickTimer;
        const sc = updates.syncCode ?? syncCode;

        if (updates.dailyHomework !== undefined) { setDailyHomework(dHW); localStorage.setItem('crk_local_daily_hw', JSON.stringify(dHW)); }
        if (updates.twelveHourHomework !== undefined) { setTwelveHourHomework(tHW); localStorage.setItem('crk_local_12h_hw', JSON.stringify(tHW)); }
        if (updates.weeklyHomework !== undefined) { setWeeklyHomework(wHW); localStorage.setItem('crk_local_weekly_hw', JSON.stringify(wHW)); }
        if (updates.currencies !== undefined) { setCurrencies(curr); localStorage.setItem('crk_local_currencies', JSON.stringify(curr)); }
        if (updates.timers !== undefined) { setTimers(tms); localStorage.setItem('crk_local_timers', JSON.stringify(tms)); }
        if (updates.postOfficeClaims !== undefined) { setPostOfficeClaims(poc); localStorage.setItem('crk_local_claims', JSON.stringify(poc)); }
        if (updates.fountainTime !== undefined) { setFountainTime(ftt); localStorage.setItem('crk_local_fountain', JSON.stringify(ftt)); }
        if (updates.quickTimer !== undefined) { setQuickTimer(qkt); localStorage.setItem('crk_local_quick_timer', JSON.stringify(qkt)); }
        
        // 💾 파이썬 브릿지 로컬 백업 자동 전송
        if (window.pywebview && window.pywebview.api && window.pywebview.api.save_local_data) {
          const pack = { dailyHomework: dHW, twelveHourHomework: tHW, weeklyHomework: wHW, currencies: curr, timers: tms, postOfficeClaims: poc, fountainTime: ftt, quickTimer: qkt, syncCode: sc };
          window.pywebview.api.save_local_data(JSON.stringify(pack));
        }
        saveToCloud(updates);
      }

      function startTimer(id) { dispatchStateUpdate({ timers: timers.map(t => t.id === id ? { ...t, isRunning: true } : t) }); }
      function pauseTimer(id) { dispatchStateUpdate({ timers: timers.map(t => t.id === id ? { ...t, isRunning: false } : t) }); }
      function resetTimer(id) { dispatchStateUpdate({ timers: timers.map(t => t.id === id ? { ...t, remainingSeconds: t.totalSeconds, isRunning: false } : t) }); }

      function handleBatchStartMines() {
        if (selectedMineIds.length === 0) { showToast("⚠️ 보낼 광산을 먼저 체크해 주세요."); return; }
        const nextTimers = timers.map(t => selectedMineIds.includes(t.id) ? { ...t, remainingSeconds: t.remainingSeconds <= 0 ? t.totalSeconds : t.remainingSeconds, isRunning: true } : t);
        dispatchStateUpdate({ timers: nextTimers }); setSelectedMineIds([]); showToast("⛏️ 체크한 광산이 일괄 출발했습니다!");
      }

      function handleSelectCompletedMines() {
        const completedMineIds = timers.filter(t => t.id.startsWith('mine_harvest_') && (t.remainingSeconds <= 0 || !t.isRunning)).map(t => t.id);
        if (completedMineIds.length === 0) { showToast("🔔 대기 중인 광산이 없습니다."); return; }
        if (completedMineIds.every(id => selectedMineIds.includes(id))) {
          setSelectedMineIds(selectedMineIds.filter(id => !completedMineIds.includes(id)));
        } else {
          setSelectedMineIds(Array.from(new Set([...selectedMineIds, ...completedMineIds])));
        }
      }
      
      function handleAddTask(type, e) {
        e.preventDefault();
        if (type === 'daily' && newDailyName.trim()) { dispatchStateUpdate({ dailyHomework: [...dailyHomework, { id: Date.now(), name: newDailyName.trim(), done: false, important: false, memo: '' }] }); setNewDailyName(''); }
        if (type === '12h' && newTwelveName.trim()) { dispatchStateUpdate({ twelveHourHomework: [...twelveHourHomework, { id: Date.now(), name: newTwelveName.trim(), done: false, important: false, memo: '' }] }); setNewTwelveName(''); }
        if (type === 'weekly' && newWeeklyName.trim()) { dispatchStateUpdate({ weeklyHomework: [...weeklyHomework, { id: Date.now(), name: newWeeklyName.trim(), done: false, important: false, memo: '' }] }); setNewWeeklyName(''); }
      }

      function handleDeleteTask(type, id) {
        if (type === 'daily') dispatchStateUpdate({ dailyHomework: dailyHomework.filter(i => i.id !== id) });
        if (type === '12h') dispatchStateUpdate({ twelveHourHomework: twelveHourHomework.filter(i => i.id !== id) });
        if (type === 'weekly') dispatchStateUpdate({ weeklyHomework: weeklyHomework.filter(i => i.id !== id) });
      }

      function handleBulkCheck(type, doneStatus) {
        if (type === 'daily') dispatchStateUpdate({ dailyHomework: dailyHomework.map(h => ({ ...h, done: doneStatus })) });
        else if (type === '12h') dispatchStateUpdate({ twelveHourHomework: twelveHourHomework.map(h => ({ ...h, done: doneStatus })) });
        else if (type === 'weekly') dispatchStateUpdate({ weeklyHomework: weeklyHomework.map(h => ({ ...h, done: doneStatus })) });
      }

      function handleAddCustomTimer(e) {
        e.preventDefault(); if (!customTimerName.trim()) return;
        const totalSecs = (parseInt(customTimerDays) || 0) * 86400 + (parseInt(customTimerHours) || 0) * 3600 + (parseInt(customTimerMinutes) || 0) * 60;
        if (totalSecs <= 0) return;
        dispatchStateUpdate({ timers: [...timers, { id: 'custom_' + Date.now(), name: customTimerName.trim(), totalSeconds: totalSecs, remainingSeconds: totalSecs, isRunning: false, preset: false }] });
        setCustomTimerName(''); setCustomTimerDays('0'); setCustomTimerHours('0'); setCustomTimerMinutes('0');
      }

      function forceResetTimersStructure() {
        if(confirm("⚠️ 타이머 구조를 강제 초기화하시겠습니까?")) { dispatchStateUpdate({ timers: DEFAULT_TIMERS }); setSelectedMineIds([]); }
      }

      function saveInlineEditModal() {
        const inputSecs = (parseInt(inlineEditConfig.days) || 0) * 86400 + (parseInt(inlineEditConfig.hours) || 0) * 3600 + (parseInt(inlineEditConfig.minutes) || 0) * 60;
        const next = timers.map(t => {
          if (t.id === inlineEditConfig.id) {
            if (inlineEditConfig.mode === 'train' || inlineEditConfig.mode === 'fixed') return { ...t, totalSeconds: inputSecs, remainingSeconds: inputSecs, isRunning: true };
            if (inlineEditConfig.mode === 'accel') return { ...t, remainingSeconds: Math.max(0, t.remainingSeconds - inputSecs), isRunning: Math.max(0, t.remainingSeconds - inputSecs) > 0 };
            return { ...t, remainingSeconds: Math.min(t.totalSeconds, inputSecs), isRunning: inputSecs > 0 };
          }
          return t;
        });
        dispatchStateUpdate({ timers: next }); setInlineEditConfig({ ...inlineEditConfig, isOpen: false });
      }

      const renderTimerCard = (t, showCheckbox = false) => {
        const isTrain = t.id.startsWith('train_');
        return (
          <div key={t.id} className={`bg-white rounded-2xl border p-4 shadow-sm flex flex-col justify-between ${showCheckbox && selectedMineIds.includes(t.id) ? 'border-amber-400 bg-amber-50/20' : 'border-stone-200'}`}>
            <div className="flex justify-between items-center">
              <div className="flex items-center gap-2">
                {showCheckbox && <input type="checkbox" checked={selectedMineIds.includes(t.id)} onChange={() => setSelectedMineIds(selectedMineIds.includes(t.id) ? selectedMineIds.filter(id => id !== t.id) : [...selectedMineIds, t.id])} className="w-3.5 h-3.5 rounded accent-stone-900" />}
                <span className="font-bold text-xs text-stone-800">{t.name}</span>
              </div>
              <div className="flex gap-1">
                <button onClick={() => t.isRunning ? pauseTimer(t.id) : startTimer(t.id)} className="p-1 border rounded bg-stone-50 text-stone-600">{t.isRunning ? <PauseIcon /> : <PlayIcon />}</button>
                <button onClick={() => resetTimer(t.id)} className="p-1 border rounded bg-stone-50 text-stone-400"><RefreshIcon /></button>
              </div>
            </div>
            <div className="my-2">
              <p className="font-mono text-sm font-black text-stone-900">{formatSeconds(t.remainingSeconds)}</p>
            </div>
            <div className="flex gap-1 pt-2 border-t text-[9px] font-bold">
              <button type="button" onClick={() => setInlineEditConfig({ isOpen: true, id: t.id, name: t.name, mode: isTrain ? 'train' : 'delay', days: '0', hours: '0', minutes: '0' })} className="flex-1 bg-amber-50 text-amber-900 rounded py-1">⏱️ 설정 보정</button>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-[#F9F7F4] text-[#2D2A26] antialiased pb-20 px-4 md:px-8">
          <header className="max-w-7xl mx-auto pt-10 pb-6 flex flex-col md:flex-row justify-between items-center gap-4 border-b border-stone-200">
            <h1 className="text-2xl font-black">🍪 쿠키런: 킹덤 올인원 플래너 <span className="bg-emerald-600 text-white text-[10px] px-2 py-0.5 rounded-full font-black">연동 활성화됨</span></h1>
            <div className="flex gap-2 items-center">
              <div className="bg-white px-4 py-2 border rounded-xl shadow-sm">
                <span className="text-[9px] font-bold text-stone-400 block">SYNC CODE</span>
                <span className="font-mono text-sm font-black text-stone-800">{syncCode}</span>
              </div>
              <button onClick={() => { windowcopyToClipboard(syncCode); showToast("📋 코드가 복사되었습니다!"); }} className="bg-stone-900 text-white text-xs px-4 py-3 rounded-xl font-bold">코드 복사</button>
              <button onClick={() => {
                const newCode = prompt("연동할 브라우저의 SYNC CODE를 입력하세요 (예: CRK-XXXXXX):");
                if (newCode && newCode.trim().toUpperCase().startsWith("CRK-")) {
                  const cleaned = newCode.trim().toUpperCase();
                  localStorage.setItem('crk_sync_code_v4', cleaned);
                  localStorage.clear(); // 꼬임 방지 초기화
                  localStorage.setItem('crk_sync_code_v4', cleaned);
                  window.location.reload();
                }
              }} className="bg-amber-600 text-white text-xs px-4 py-3 rounded-xl font-bold">코드 입력(연동)</button>
            </div>
          </header>

          <nav className="max-w-7xl mx-auto mt-6 sticky top-4 z-50">
            <div className="bg-white/80 backdrop-blur-xl border p-1.5 rounded-2xl shadow-md max-w-xl mx-auto">
              <div className="grid grid-cols-4 gap-1">
                {[['dashboard', '📊 대시보드'], ['homework', '📅 숙제 패널'], ['currency', '⚡ 재화 설정'], ['timer', '⏳ 가속 센터']].map(([id, label]) => (
                  <button key={id} onClick={() => setActiveTab(id)} className={`py-2 text-xs font-bold rounded-xl ${activeTab === id ? 'bg-stone-900 text-white' : 'text-stone-600'}`}>{label}</button>
                ))}
              </div>
            </div>
          </nav>

          <main className="max-w-7xl mx-auto mt-8">
            {activeTab === 'dashboard' && (
              <div className="space-y-6">
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                  {/* 우체국 */}
                  <div className="lg:col-span-4 bg-white p-6 rounded-3xl border shadow-sm">
                    <span className="text-[10px] font-bold text-stone-400 block">📮 POST OFFICE MONITOR</span>
                    <h2 className="text-base font-bold mt-3">{postOfficeStatus.text}</h2>
                    <p className="text-[11px] text-stone-400">{postOfficeStatus.subText}</p>
                    <div className="mt-4 grid grid-cols-3 gap-1.5">
                      {[0, 1, 2].map(idx => (
                        <button key={idx} onClick={() => { const claims = [...postOfficeClaims.claims]; claims[idx] = !claims[idx]; dispatchStateUpdate({ postOfficeClaims: { ...postOfficeClaims, claims } }); }} className={`py-2 rounded-xl text-[11px] font-bold border ${postOfficeClaims.claims[idx] ? 'bg-stone-900 text-white' : 'bg-[#FAF9F6] text-stone-600'}`}>{idx + 1}회 {postOfficeClaims.claims[idx] ? '✓' : '대기'}</button>
                      ))}
                    </div>
                  </div>

                  {/* 풍요의 분수 */}
                  <div className="lg:col-span-4 bg-white p-6 rounded-3xl border shadow-sm flex flex-col justify-between">
                    <div>
                      <span className="text-[10px] font-black text-amber-700 block">⛲ FOUNTAIN</span>
                      <h2 className="text-xl font-black mt-1 font-mono">{formatElapsedSeconds(fountainTime.elapsedSeconds)}</h2>
                    </div>
                    <div className="flex gap-2 mt-4">
                      <button type="button" onClick={() => dispatchStateUpdate({ fountainTime: { ...fountainTime, elapsedSeconds: 0 } })} className="flex-1 bg-amber-700 text-white text-[11px] font-bold py-2.5 rounded-xl">보상 수령</button>
                      <button type="button" onClick={() => dispatchStateUpdate({ fountainTime: { ...fountainTime, isRunning: !fountainTime.isRunning } })} className="px-3 bg-stone-100 text-xs rounded-xl">{fountainTime.isRunning ? '⏸ 정지' : '▶ 시작'}</button>
                    </div>
                  </div>

                  {/* 숙제 현황 */}
                  <div className="lg:col-span-4 bg-white p-6 rounded-3xl border shadow-sm">
                    <span className="text-[10px] font-bold text-stone-400 block">📊 PROGRESS PANEL</span>
                    <div className="mt-4 text-3xl font-black">{totalProgressPercent}% <span className="text-xs text-stone-400 font-bold">({totalCompletedTasks}/{totalTasks} 완료)</span></div>
                  </div>
                </div>

                {/* 재화 대시보드 */}
                <div className="bg-white p-6 rounded-3xl border shadow-sm">
                  <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                    {computedCurrencies.map(c => (
                      <div key={c.id} className="p-4 bg-[#FAF9F6] rounded-2xl border">
                        <p className="text-[11px] font-bold text-stone-500">{c.name}</p>
                        <p className="text-xl font-black mt-1 font-mono">{c.liveCurrent} <span className="text-xs text-stone-400">/ {c.max}</span></p>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'homework' && (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                {/* 일일 숙제 */}
                <div className="bg-white p-6 rounded-3xl border shadow-sm">
                  <h3 className="font-bold text-stone-900 border-b pb-2">🌅 일일 숙제</h3>
                  <form onSubmit={e => handleAddTask('daily', e)} className="flex gap-2 py-3">
                    <input type="text" placeholder="+ 직접 추가" value={newDailyName} onChange={e => setNewDailyName(e.target.value)} className="flex-1 border text-xs px-3 py-2 rounded-xl" />
                    <button type="submit" className="bg-stone-900 text-white rounded-xl px-4 font-bold">+</button>
                  </form>
                  <div className="space-y-1.5">
                    {getSortedHomework(dailyHomework).map(item => (
                      <div key={item.id} className="p-3 border rounded-xl flex justify-between items-center text-xs bg-white">
                        <label className="flex items-center gap-2 cursor-pointer flex-1"><input type="checkbox" checked={item.done} onChange={() => dispatchStateUpdate({ dailyHomework: dailyHomework.map(h => h.id === item.id ? { ...h, done: !h.done } : h) })} className="rounded" /> <span className={item.done ? 'line-through text-stone-400' : ''}>{item.name}</span></label>
                        <button onClick={() => handleDeleteTask('daily', item.id)} className="text-stone-300 hover:text-rose-600">✕</button>
                      </div>
                    ))}
                  </div>
                </div>

                {/* 12시간 숙제 */}
                <div className="bg-white p-6 rounded-3xl border shadow-sm">
                  <h3 className="font-bold text-stone-900 border-b pb-2">⚔️ 12시간 숙제</h3>
                  <form onSubmit={e => handleAddTask('12h', e)} className="flex gap-2 py-3">
                    <input type="text" placeholder="+ 직접 추가" value={newTwelveName} onChange={e => setNewTwelveName(e.target.value)} className="flex-1 border text-xs px-3 py-2 rounded-xl" />
                    <button type="submit" className="bg-stone-900 text-white rounded-xl px-4 font-bold">+</button>
                  </form>
                  <div className="space-y-1.5">
                    {getSortedHomework(twelveHourHomework).map(item => (
                      <div key={item.id} className="p-3 border rounded-xl flex justify-between items-center text-xs bg-white">
                        <label className="flex items-center gap-2 cursor-pointer flex-1"><input type="checkbox" checked={item.done} onChange={() => dispatchStateUpdate({ twelveHourHomework: twelveHourHomework.map(h => h.id === item.id ? { ...h, done: !h.done } : h) })} className="rounded" /> <span className={item.done ? 'line-through text-stone-400' : ''}>{item.name}</span></label>
                        <button onClick={() => handleDeleteTask('12h', item.id)} className="text-stone-300 hover:text-rose-600">✕</button>
                      </div>
                    ))}
                  </div>
                </div>

                {/* 주간 숙제 */}
                <div className="bg-white p-6 rounded-3xl border shadow-sm">
                  <h3 className="font-bold text-stone-900 border-b pb-2">🛡️ 주간 숙제</h3>
                  <form onSubmit={e => handleAddTask('weekly', e)} className="flex gap-2 py-3">
                    <input type="text" placeholder="+ 직접 추가" value={newWeeklyName} onChange={e => setNewWeeklyName(e.target.value)} className="flex-1 border text-xs px-3 py-2 rounded-xl" />
                    <button type="submit" className="bg-stone-900 text-white rounded-xl px-4 font-bold">+</button>
                  </form>
                  <div className="space-y-1.5">
                    {getSortedHomework(weeklyHomework).map(item => (
                      <div key={item.id} className="p-3 border rounded-xl flex justify-between items-center text-xs bg-white">
                        <label className="flex items-center gap-2 cursor-pointer flex-1"><input type="checkbox" checked={item.done} onChange={() => dispatchStateUpdate({ weeklyHomework: weeklyHomework.map(h => h.id === item.id ? { ...h, done: !h.done } : h) })} className="rounded" /> <span className={item.done ? 'line-through text-stone-400' : ''}>{item.name}</span></label>
                        <button onClick={() => handleDeleteTask('weekly', item.id)} className="text-stone-300 hover:text-rose-600">✕</button>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'currency' && (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {computedCurrencies.map(c => (
                  <div key={c.id} className="bg-white rounded-3xl border p-6 shadow-sm">
                    <div className="flex justify-between items-center mb-4">
                      <span className="font-black text-stone-800 text-sm">{c.name}</span>
                    </div>
                    <div className="space-y-4">
                      <div className="bg-stone-50 p-4 rounded-xl border flex justify-between text-base">
                        <div className="flex flex-col"><span className="text-[9px] text-stone-400 block">현재</span><input type="number" value={c.current} onChange={e => handleUpdateCurrencyCurrent(c.id, e.target.value)} className="w-16 bg-transparent font-bold focus:outline-none" /></div>
                        <div className="flex flex-col items-end"><span className="text-[9px] text-stone-400 block">최대</span><input type="number" value={c.max} onChange={e => handleUpdateCurrencyMax(c.id, e.target.value)} className="w-16 bg-transparent text-right font-bold focus:outline-none" /></div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {activeTab === 'timer' && (
              <div className="space-y-8">
                <div className="bg-white p-6 rounded-3xl border shadow-sm max-w-4xl flex justify-between items-center">
                  <h3 className="font-black text-stone-900 text-sm">⏳ 가속 타이머 관제</h3>
                  <button type="button" onClick={forceResetTimersStructure} className="bg-rose-50 border text-rose-700 text-xs font-black px-4 py-2 rounded-xl">🔄 타이머 구조 초기화</button>
                </div>

                <div className="space-y-3">
                  <h4 className="text-sm font-black text-stone-700">🚂 곰젤리 열차 모니터링</h4>
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    {getSortedTimers(timers.filter(t => t.id.startsWith('train_'))).map(t => renderTimerCard(t))}
                  </div>
                </div>

                <div className="space-y-4">
                  <div className="bg-stone-900 text-white p-4 rounded-2xl flex justify-between items-center">
                    <h4 className="text-sm font-black">⛏️ 납작이 광산 채굴 현황</h4>
                    <div className="flex gap-2">
                      <button type="button" onClick={handleSelectCompletedMines} className="text-xs bg-white/10 px-3 py-1.5 rounded-xl border border-white/10">완료 선택</button>
                      <button type="button" onClick={handleBatchStartMines} className="bg-amber-500 text-stone-950 text-xs font-black px-4 py-1.5 rounded-xl">일괄출발 ({selectedMineIds.length})</button>
                    </div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    {getSortedTimers(timers.filter(t => t.id.startsWith('mine_harvest_'))).map(t => renderTimerCard(t, true))}
                  </div>
                </div>
              </div>
            )}
          </main>

          {/* 모달 팝업 */}
          {inlineEditConfig.isOpen && (
            <div className="fixed inset-0 z-[200] bg-stone-900/40 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="bg-white rounded-3xl p-6 max-w-sm w-full space-y-4">
                <h4 className="font-black text-stone-900 text-base">⏱️ 타이머 설정 및 보정</h4>
                <div className="grid grid-cols-3 gap-2 text-xs font-bold">
                  <div className="flex flex-col gap-1"><span className="text-stone-400 text-center">일</span><input type="number" value={inlineEditConfig.days} onChange={e => setInlineEditConfig({ ...inlineEditConfig, days: e.target.value })} className="border p-2 rounded-xl bg-stone-50 text-center font-mono" /></div>
                  <div className="flex flex-col gap-1"><span className="text-stone-400 text-center">시</span><input type="number" value={inlineEditConfig.hours} onChange={e => setInlineEditConfig({ ...inlineEditConfig, hours: e.target.value })} className="border p-2 rounded-xl bg-stone-50 text-center font-mono" /></div>
                  <div className="flex flex-col gap-1"><span className="text-stone-400 text-center">분</span><input type="number" value={inlineEditConfig.minutes} onChange={e => setInlineEditConfig({ ...inlineEditConfig, minutes: e.target.value })} className="border p-2 rounded-xl bg-stone-50 text-center font-mono" /></div>
                </div>
                <div className="flex gap-2 justify-end pt-2 border-t">
                  <button onClick={() => setInlineEditConfig({ ...inlineEditConfig, isOpen: false })} className="px-4 py-2 border rounded-xl text-xs font-bold">취소</button>
                  <button onClick={saveInlineEditModal} className="px-4 py-2 bg-stone-900 text-white rounded-xl text-xs font-bold">적용하기</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>
</html>
